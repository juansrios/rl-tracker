// ── ERRORS BY RANK TIER ────────────────────────────────────────────────────────
// Each error has minTier — below that tier, the error is hidden (not relevant)
const ALL_ERRORS = [
  {id:"whiff",      label:"Whiff en Aerial",          minTier:4}, // Plat+
  {id:"overcommit", label:"Overcommit / Doble Commit", minTier:1},
  {id:"rotacion",   label:"Mala Rotación",             minTier:2}, // Silver+

  {id:"cincuenta",  label:"Perdiste el 50/50",         minTier:1},

function getErrorsForTier(tier, focusIds=null){
  const byTier=ALL_ERRORS.filter(e=>e.minTier<=tier);
  if(!focusIds||focusIds.length===0||focusIds.includes("general")) return byTier;
  const relevant=new Set(focusIds.flatMap(fid=>{
    const f=FOCUSES.find(f=>f.id===fid);
    return f?.errors||[];
  }));
  return byTier.filter(e=>relevant.has(e.id));
}

  whiff:      {upper:["shoulder","pushup","pushup_k"],core:["mclimb","plank","plank_k"],  lower:["sqjump","sqfast","squat"], full:["mclimb","burpee","burpee_e","burpee_b"]},

  rotacion:   {upper:["tricep","plank","plank_k"],   core:["twist","twist_e","legrise"],   lower:["glute","lunge","squat"],   full:["twist","twist_e","bear","jjack"]},
  open_net:   {upper:["pushup","pushup_k","shoulder"],core:["mclimb","superman","crunch"], lower:["sqjump","sqfast","calf"],   full:["burpee","burpee_e","burpee_b","jjack"]},
  kickoff:    {upper:["plank","plank_k","pushup_w"], core:["crunch","superman","legrise"], lower:["squat","calf","glute"],    full:["jjack","bear","burpee_b"]},
  boost:      {upper:["plank","plank_k","tricep"],   core:["plank","plank_k","superman"], lower:["glute","squat","calf"],    full:["plank","plank_k","jjack"]},
  posicion:   {upper:["pushup","pushup_k","pushup_w"],core:["legrise","crunch","superman"],lower:["lunge","glute","squat"],  full:["squat","jjack","burpee_b"]},
  timing:     {upper:["tricep","shoulder","pushup"],  core:["twist","twist_e","mclimb"],   lower:["sqjump","sqfast","calf"],  full:["mclimb","burpee_e","burpee_b","jjack"]},
  cincuenta:  {upper:["pushup","pushup_k","pushup_w"],core:["crunch","plank","plank_k"],   lower:["squat","lunge","glute"],  full:["burpee_b","jjack","bear"]},
};

const ERR_LABELS=Object.fromEntries(ALL_ERRORS.map(e=>[e.id,e.label]));

function pickExercise(errId,area,gender,tier){
  const candidates=(ERROR_MAP[errId]||{})[area]||[];
  const filtered=candidates
    .map(id=>POOL.find(e=>e.id===id))
    .filter(e=>e&&(e.gender==="b"||e.gender===gender)&&e.min<=tier&&(!e.max||e.max>=tier));
  if(filtered.length>0)return filtered[0];
  const fallback=POOL.filter(e=>e.areas.includes(area)&&(e.gender==="b"||e.gender===gender)&&e.min<=tier&&(!e.max||e.max>=tier));
  return fallback[0]||POOL.find(e=>e.areas.includes(area))||POOL[0];
}

function buildPlan(errors,hits,area,gender,tier){
  const HIT_REDUCTION=3;
  const reduction=Math.floor(hits/HIT_REDUCTION);
  const plan=[];
  Object.entries(errors).forEach(([errId,count])=>{
    if(count<=0)return;
    const ex=pickExercise(errId,area,gender,tier);
    if(!ex)return;
    const existing=plan.find(p=>p.exId===ex.id);
    const sets=Math.min(5,2+(count-1)); // min 2
    if(existing){existing.sets=Math.min(5,existing.sets+1);existing.errLabels.push(ERR_LABELS[errId]);}
    else plan.push({exId:ex.id,...ex,sets,errLabels:[ERR_LABELS[errId]]});
  });
  // Reduce by hits but never below 2
  let toReduce=Math.min(reduction,plan.reduce((a,e)=>a+Math.max(0,e.sets-2),0));
  for(const ex of [...plan].sort((a,b)=>b.sets-a.sets)){
    if(toReduce<=0)break;
    const orig=plan.find(p=>p.exId===ex.exId);
    const reduce=Math.min(orig.sets-2,toReduce);
    orig.sets-=reduce;toReduce-=reduce;
  }
  return plan.filter(p=>p.sets>=2);
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
const WKEY='rlw_history3';
function loadHistory(){try{const s=localStorage.getItem(WKEY);return s?JSON.parse(s):[];}catch{return[];}}
function saveHistory(h){localStorage.setItem(WKEY,JSON.stringify(h));}
function getAllSessions(){
  for(const key of['rlt3_s','rlt3f_s']){
    try{const raw=localStorage.getItem(key);if(raw){const d=JSON.parse(raw);if(d&&d.length>0)return d;}}catch{}
  }return[];
}
function extractFromSession(session,tier,focusIds=null){
  const errors=Object.fromEntries(getErrorsForTier(tier,focusIds).map(e=>[e.id,0]));
  let hits=0;
  session.matches?.forEach(m=>{
    Object.entries(m.errors||{}).forEach(([k,v])=>{if(k in errors)errors[k]=(errors[k]||0)+v;});
    Object.values(m.hits||{}).forEach(v=>{hits+=v;});
  });
  return{errors,hits};
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function Timer({seconds,total,onDone,label,color="var(--green)"}){
  const [left,setLeft]=useState(seconds);
  useEffect(()=>{
    const iv=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(iv);onDone();return 0;}return l-1;}),1000);
    return()=>clearInterval(iv);
  },[]);
  const r=60,circ=2*Math.PI*r,offset=circ-(left/total)*circ;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
      {label&&<div style={{fontSize:11,fontWeight:600,color:"var(--sub)",textTransform:"uppercase",letterSpacing:2}}>{label}</div>}
      <div style={{width:136,height:136,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        <svg width="136" height="136" viewBox="0 0 136 136" style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
          <circle cx="68" cy="68" r={r} fill="none" stroke="var(--border)" strokeWidth="5"/>
          <circle cx="68" cy="68" r={r} fill="none" stroke={color} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:"stroke-dashoffset .9s linear"}}/>
        </svg>
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div className="D" style={{fontSize:46,fontWeight:900,lineHeight:1,color}}>{left}</div>
          <div style={{fontSize:10,color:"var(--muted)"}}>seg</div>
        </div>
      </div>
      <button onClick={onDone} style={{padding:"5px 18px",borderRadius:8,border:"1px solid var(--border)",background:"none",color:"var(--muted)",fontSize:11}}>Saltar →</button>
    </div>
  );
}

function SetDots({done,total,color}){

// ── EXECUTION SCREEN ──────────────────────────────────────────────────────────
function RestTimer({seconds,color}){
  const [left,setLeft]=useState(seconds);
  useEffect(()=>{
    const iv=setInterval(()=>setLeft(l=>Math.max(0,l-1)),1000);
    return()=>clearInterval(iv);
  },[]);
  const r=50,circ=2*Math.PI*r,offset=circ-(left/seconds)*circ;
  return(
    <div style={{width:120,height:120,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <svg width="120" height="120" viewBox="0 0 120 120" style={{position:"absolute",top:0,left:0,transform:"rotate(-90deg)"}}>
        <circle cx="60" cy="60" r={r} fill="none" stroke="var(--border)" strokeWidth="5"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .9s linear"}}/>
      </svg>
      <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
        <div className="D" style={{fontSize:36,fontWeight:900,lineHeight:1,color}}>{left}</div>
        <div style={{fontSize:10,color:"var(--muted)"}}>seg</div>
      </div>
    </div>
  );
}

function ExecutionScreen({players,onFinish}){
  const isCoop=players.length>1;
  const totalSets=players.reduce((a,p)=>a+p.plan.reduce((b,e)=>b+e.sets,0),0);

  // Per-player state: {exIdx, setNum, done}
  const [pState,setPState]=useState(()=>players.map(()=>({exIdx:0,setNum:1,done:false})));
  const [doneSets,setDoneSets]=useState(0);
  const [resting,setResting]=useState({}); // {pIdx: true} when player is resting

  const allDone=pState.every(p=>p.done);
  const overallPct=totalSets>0?Math.round((doneSets/totalSets)*100):0;

  const completeSet=(pIdx)=>{
    const ps=pState[pIdx];
    const plan=players[pIdx].plan;
    const ex=plan[ps.exIdx];
    setDoneSets(d=>d+1);

    if(ps.setNum<ex.sets){
      // More sets — start rest then next set
      setResting(r=>({...r,[pIdx]:true}));
      setTimeout(()=>{
        setResting(r=>({...r,[pIdx]:false}));
        setPState(prev=>prev.map((p,i)=>i===pIdx?{...p,setNum:p.setNum+1}:p));
      },ex.rest*1000);
    } else if(ps.exIdx+1<plan.length){
      // Next exercise
      setResting(r=>({...r,[pIdx]:true}));
      setTimeout(()=>{
        setResting(r=>({...r,[pIdx]:false}));
        setPState(prev=>prev.map((p,i)=>i===pIdx?{...p,exIdx:p.exIdx+1,setNum:1}:p));
      },ex.rest*1000);
    } else {
      // Player done
      setPState(prev=>prev.map((p,i)=>i===pIdx?{...p,done:true}:p));
    }
  };

  if(allDone)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{fontSize:72,marginBottom:16}}>🏆</div>
      <div className="D" style={{fontSize:52,fontWeight:900,color:"var(--green)",marginBottom:8}}>¡COMPLETADO!</div>
      <div style={{fontSize:15,color:"var(--sub)",marginBottom:8}}>{totalSets} series · {players.reduce((a,p)=>a+p.plan.length,0)} ejercicios</div>
      {isCoop&&<div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>
        {players.map((p,i)=><span key={i} style={{color:p.color,fontWeight:700}}>{p.name}</span>)}
      </div>}
      <button onClick={()=>onFinish(true)} style={{padding:"14px 36px",borderRadius:10,border:"none",background:"var(--green)",color:"#000",fontSize:16,fontWeight:700}}>
        Ver historial →
      </button>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",padding:20}}>
      {/* Progress bar */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--muted)",marginBottom:6}}>
          <span>{isCoop?"Entrenamiento cooperativo":"Entrenamiento"}</span>
          <span>{overallPct}% completado</span>
        </div>
        <div style={{height:3,background:"var(--border)",borderRadius:2}}>
          <div style={{height:"100%",width:`${overallPct}%`,background:"var(--green)",borderRadius:2,transition:"width .4s"}}/>
        </div>
      </div>

      {/* Player columns */}
      <div style={{display:"grid",gridTemplateColumns:isCoop?"1fr 1fr":"1fr",gap:12,flex:1}}>
        {players.map((player,pIdx)=>{
          const ps=pState[pIdx];
          const plan=player.plan;
          const ex=plan[ps.exIdx];
          const isResting=resting[pIdx];
          const isDone=ps.done;

          if(isDone)return(
            <div key={pIdx} style={{background:"var(--card)",borderRadius:12,padding:20,
              border:`2px solid ${player.color}`,display:"flex",flexDirection:"column",
              alignItems:"center",justifyContent:"center",gap:12,textAlign:"center"}}>
              <div style={{fontSize:48}}>✅</div>
              <div className="D" style={{fontSize:24,fontWeight:900,color:player.color}}>¡{player.name} listo!</div>
              <div style={{fontSize:13,color:"var(--sub)"}}>Esperando al otro jugador...</div>
            </div>
          );

          if(isResting){
            const nextLabel=ps.setNum<ex.sets?`Serie ${ps.setNum+1}/${ex.sets}`:(plan[ps.exIdx+1]?.name||"¡Listo!");
            return(
              <div key={pIdx} style={{background:"var(--card)",borderRadius:12,padding:20,
                border:`2px solid ${player.color}`,display:"flex",flexDirection:"column",
                alignItems:"center",justifyContent:"center",gap:10,textAlign:"center"}}>
                <div className="D" style={{fontSize:15,fontWeight:700,color:player.color}}>{player.name} — Descanso</div>
                <RestTimer key={`${pIdx}-${ps.exIdx}-${ps.setNum}`} seconds={ex.rest} color={player.color}/>
                <div style={{fontSize:11,color:"var(--muted)"}}>Próximo: <strong style={{color:player.color}}>{nextLabel}</strong></div>
                <button onClick={()=>{
                  setResting(r=>({...r,[pIdx]:false}));
                  if(ps.setNum<ex.sets){
                    setPState(prev=>prev.map((p,i)=>i===pIdx?{...p,setNum:p.setNum+1}:p));
                  } else {
                    setPState(prev=>prev.map((p,i)=>i===pIdx?{...p,exIdx:p.exIdx+1,setNum:1}:p));
                  }
                }} style={{padding:"6px 18px",borderRadius:8,border:`1px solid ${player.color}`,background:"none",color:player.color,fontSize:11,cursor:"pointer",fontWeight:600}}>
                  Saltar →
                </button>
              </div>
            );
          }

          return(
            <ExCard key={pIdx} ex={ex} setNum={ps.setNum} player={player}
              onComplete={()=>completeSet(pIdx)}
              onTimerDone={()=>completeSet(pIdx)}
              compact={isCoop}/>
          );
        })}
      </div>
    </div>
  );
}

// ── SESSION PICKER ────────────────────────────────────────────────────────────
function SessionPicker({sessions,onSelect,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:"var(--surface)",borderRadius:"16px 16px 12px 12px",width:"100%",maxWidth:520,maxHeight:"70vh",overflow:"auto",border:"1px solid var(--border)"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"var(--surface)"}}>
          <div style={{fontSize:15,fontWeight:700}}>Seleccionar sesión</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        {sessions.length===0
          ?<div style={{padding:32,textAlign:"center",color:"var(--muted)",fontSize:13}}>No hay sesiones en RL Tracker.</div>
          :sessions.slice(0,10).map((s,i)=>{
            const te=s.matches?.reduce((a,m)=>a+Object.values(m.errors||{}).reduce((x,y)=>x+y,0),0)||0;
            const th=s.matches?.reduce((a,m)=>a+Object.values(m.hits||{}).reduce((x,y)=>x+y,0),0)||0;
            return(
              <button key={i} onClick={()=>onSelect(s)}
                style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"13px 18px",border:"none",borderBottom:"1px solid var(--border)",background:"none",cursor:"pointer",textAlign:"left"}}
                onMouseEnter={e=>e.currentTarget.style.background="var(--card)"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{s.modeName}</div>
                  <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{s.date} · {s.matches?.length||0} partidas</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:12,color:"var(--red)",fontWeight:600}}>{te} err</span>
                  {th>0&&<span style={{fontSize:12,color:"var(--green)",fontWeight:600}}>{th} ✓</span>}
                </div>
                <span style={{color:"var(--muted)"}}>›</span>
              </button>
            );
          })}
      </div>
    </div>
  );
}

// ── PLAYER CONFIG ─────────────────────────────────────────────────────────────
function PlayerConfig({player,onChange,label,color}){
  const [sessions]=useState(getAllSessions);
  const [showPicker,setShowPicker]=useState(false);
  const [sessionInfo,setSessionInfo]=useState(null);
  const [importMode,setImportMode]=useState("manual");

  const tier=RANKS.find(r=>r.id===player.rankId)?.tier||1;
  const focuses=player.focuses||[];
  const visibleErrors=getErrorsForTier(tier,focuses);

  const toggleFocus=(fid)=>{
    let newFocuses;
    if(fid==="general"){
      newFocuses=["general"];
    } else {
      const without=focuses.filter(f=>f!=="general");
      newFocuses=without.includes(fid)?without.filter(f=>f!==fid):[...without,fid];
      if(newFocuses.length===0)newFocuses=[];
    }
    const newErrors=Object.fromEntries(getErrorsForTier(tier,newFocuses).map(e=>[e.id,0]));
    onChange({...player,focuses:newFocuses,errors:newErrors,hits:0});
    setSessionInfo(null);setImportMode("manual");
  };

  const selectSession=(s)=>{
    const{errors,hits}=extractFromSession(s,tier,focuses);
    setSessionInfo(s);onChange({...player,errors,hits});setShowPicker(false);setImportMode("auto");
  };

  const setErr=(k,v)=>onChange({...player,errors:{...player.errors,[k]:Math.max(0,v)}});
  const setRank=(r)=>{
    const newTier=r.tier;
    const newErrors=Object.fromEntries(getErrorsForTier(newTier,focuses).map(e=>[e.id,0]));
    onChange({...player,rankId:r.id,tier:newTier,errors:newErrors,hits:0});
    setSessionInfo(null);setImportMode("manual");
  };

  return(
    <div style={{marginBottom:20}}>
      {showPicker&&<SessionPicker sessions={sessions} onSelect={selectSession} onClose={()=>setShowPicker(false)}/>}

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <div style={{width:10,height:10,borderRadius:"50%",background:color,flexShrink:0}}/>
        <div className="D" style={{fontSize:20,fontWeight:800,color}}>{label}</div>
      </div>

      {/* Gender */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Género</div>
        <div style={{display:"flex",gap:8}}>
          {[["m","♂ Masculino"],["f","♀ Femenino"]].map(([g,lbl])=>(
            <button key={g} onClick={()=>onChange({...player,gender:g})}
              style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${player.gender===g?color:"var(--border)"}`,
                background:player.gender===g?`${color}18`:"var(--card)",color:player.gender===g?color:"var(--sub)",fontSize:13,fontWeight:player.gender===g?700:400}}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      {/* Rank */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Rango actual</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {RANKS.map(r=>(
            <button key={r.id} onClick={()=>setRank(r)}
              style={{padding:"8px 4px",borderRadius:8,border:`2px solid ${player.rankId===r.id?r.color:"var(--border)"}`,
                background:player.rankId===r.id?`${r.color}18`:"var(--card)",
                color:player.rankId===r.id?r.color:"var(--muted)",fontSize:11,fontWeight:player.rankId===r.id?700:400}}>
              {r.label}
            </button>
          ))}
        </div>
        {visibleErrors.length>0&&<div style={{fontSize:11,color:"var(--muted)",marginTop:6}}>
          {visibleErrors.length} errores relevantes para {RANKS.find(r=>r.id===player.rankId)?.label}
        </div>}
      </div>

      {/* Focus selector */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
          ¿Qué quieres mejorar? <span style={{color:"var(--muted)",fontWeight:400,textTransform:"none"}}>(elige uno o varios)</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {FOCUSES.map(f=>{
            const active=focuses.includes(f.id)||(f.id==="general"&&focuses.length===0);
            return(
              <button key={f.id} onClick={()=>toggleFocus(f.id)}
                style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,
                  border:`1.5px solid ${active?color:"var(--border)"}`,
                  background:active?`${color}15`:"var(--card)",
                  color:active?color:"var(--sub)",cursor:"pointer",textAlign:"left"}}>
                <span style={{fontSize:16,flexShrink:0}}>{f.icon}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:active?700:500}}>{f.label}</div>
                  <div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>{f.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
        {visibleErrors.length>0&&focuses.length>0&&!focuses.includes("general")&&(
          <div style={{fontSize:11,color:color,marginTop:8,padding:"6px 10px",background:`${color}10`,borderRadius:6}}>
            {visibleErrors.length} error{visibleErrors.length!==1?"es":""} seleccionado{visibleErrors.length!==1?"s":""}: {visibleErrors.map(e=>e.label).join(", ")}
          </div>
        )}
      </div>

      {/* Error source */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Errores de la sesión</div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {sessions.length>0&&<button onClick={()=>setShowPicker(true)}
            style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${importMode==="auto"?color:"var(--border)"}`,
              background:importMode==="auto"?`${color}10`:"var(--card)",color:importMode==="auto"?color:"var(--sub)",fontSize:12,cursor:"pointer"}}>
            ⚡ {sessionInfo?"Sesión cargada":"Importar sesión"}
          </button>}
          <button onClick={()=>{setImportMode("manual");setSessionInfo(null);
            onChange({...player,errors:Object.fromEntries(getErrorsForTier(tier,focuses).map(e=>[e.id,0])),hits:0});}}
            style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${importMode==="manual"?color:"var(--border)"}`,
              background:importMode==="manual"?`${color}10`:"var(--card)",color:importMode==="manual"?color:"var(--sub)",fontSize:12,cursor:"pointer"}}>
            ✏️ Manual
          </button>
        </div>
        {sessionInfo&&<div style={{fontSize:11,color:"var(--muted)",padding:"6px 10px",background:"var(--surface)",borderRadius:6,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
          <span>{sessionInfo.modeName} · {sessionInfo.date}</span>
          <button onClick={()=>setShowPicker(true)} style={{background:"none",border:"none",color:color,fontSize:11,cursor:"pointer"}}>Cambiar</button>
        </div>}
      </div>

      {/* Error counters — only show errors relevant to rank */}
      <div style={{display:"grid",gap:6}}>
        {visibleErrors.map(e=>(
          <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"var(--card)",borderRadius:8,
            border:`1px solid ${(player.errors[e.id]||0)>0?"rgba(255,71,87,.3)":"var(--border)"}`}}>
            <div style={{flex:1,fontSize:12,fontWeight:600,color:(player.errors[e.id]||0)>0?"var(--text)":"var(--sub)"}}>{e.label}</div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
              <button onClick={()=>setErr(e.id,(player.errors[e.id]||0)-1)}
                style={{width:28,height:28,borderRadius:6,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--sub)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
              <span className="D" style={{fontSize:20,fontWeight:700,color:(player.errors[e.id]||0)>0?"var(--red)":"var(--muted)",minWidth:20,textAlign:"center"}}>{player.errors[e.id]||0}</span>
              <button onClick={()=>setErr(e.id,(player.errors[e.id]||0)+1)}
                style={{width:28,height:28,borderRadius:6,border:"1px solid rgba(255,71,87,.4)",background:"rgba(255,71,87,.1)",color:"var(--red)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>
        ))}
        {/* Hits */}
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(57,217,138,.05)",borderRadius:8,border:"1px solid rgba(57,217,138,.2)"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--green)"}}>✓ Aciertos totales</div>
            <div style={{fontSize:10,color:"var(--muted)"}}>Cada 3 = −1 serie (mín. 2)</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>onChange({...player,hits:Math.max(0,(player.hits||0)-1)})}
              style={{width:28,height:28,borderRadius:6,border:"1px solid var(--border)",background:"var(--surface)",color:"var(--sub)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <span className="D" style={{fontSize:20,fontWeight:700,color:"var(--green)",minWidth:20,textAlign:"center"}}>{player.hits||0}</span>
            <button onClick={()=>onChange({...player,hits:(player.hits||0)+1})}
              style={{width:28,height:28,borderRadius:6,border:"1px solid rgba(57,217,138,.4)",background:"rgba(57,217,138,.1)",color:"var(--green)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── SETUP SCREEN ──────────────────────────────────────────────────────────────
function SetupScreen({onStart}){
  const [step,setStep]=useState("mode");
  const [mode,setMode]=useState(null);
  const [area,setArea]=useState(null);
  const defaultPlayer=(gender="m")=>({gender,rankId:"gold",tier:3,focuses:[],errors:Object.fromEntries(getErrorsForTier(3,[]).map(e=>[e.id,0])),hits:0});
  const [p1,setP1]=useState(()=>defaultPlayer("m"));
  const [p2,setP2]=useState(()=>defaultPlayer("f"));
  const COLORS=["var(--orange)","var(--pink)"];

  useEffect(()=>{
    const sessions=getAllSessions();
    if(sessions.length>0){
      const tier=RANKS.find(r=>r.id===p1.rankId)?.tier||3;
      const{errors,hits}=extractFromSession(sessions[0],tier);
      setP1(prev=>({...prev,errors,hits}));
    }
  },[]);

  const buildPlayers=()=>{
    if(mode==="individual"){
      return[{name:"Tú",color:COLORS[0],plan:buildPlan(p1.errors,p1.hits||0,area,p1.gender,p1.tier)}];
    }
    return[
      {name:"Jugador 1",color:COLORS[0],plan:buildPlan(p1.errors,p1.hits||0,area,p1.gender,p1.tier)},
      {name:"Jugador 2",color:COLORS[1],plan:buildPlan(p2.errors,p2.hits||0,area,p2.gender,p2.tier)},
    ];
  };

  const players=step==="preview"?buildPlayers():[];
  const canStart=players.length>0&&players.some(p=>p.plan.length>0);
  const STEPS=["mode","area","config","preview"];

  return(
    <div style={{maxWidth:520,margin:"0 auto",padding:"20px 16px 80px"}}>
      <div style={{textAlign:"center",marginBottom:24,paddingTop:8}}>
        <div style={{fontSize:42,marginBottom:6}}>🏋️</div>
        <div className="D" style={{fontSize:36,fontWeight:900,letterSpacing:-1}}>RL WORKOUT</div>
        <div style={{fontSize:12,color:"var(--sub)",marginTop:3}}>Entrena tus errores de Rocket League</div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:24,justifyContent:"center"}}>
        {STEPS.map((s,i)=>(
          <div key={s} style={{width:28,height:4,borderRadius:2,
            background:STEPS.indexOf(step)>=i?"var(--orange)":"var(--border)",transition:"background .2s"}}/>
        ))}
      </div>

      {step==="mode"&&(
        <div className="au">
          <div style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Modo</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
            {[["individual","👤","Individual","Solo tú"],["coop","👥","Cooperativo","Tú y alguien más"]].map(([m,ic,lbl,desc])=>(
              <button key={m} onClick={()=>setMode(m)}
                style={{padding:"18px 14px",borderRadius:12,border:`2px solid ${mode===m?"var(--orange)":"var(--border)"}`,
                  background:mode===m?"rgba(255,107,53,.08)":"var(--card)",color:mode===m?"var(--orange)":"var(--sub)",textAlign:"left",cursor:"pointer"}}>
                <div style={{fontSize:28,marginBottom:6}}>{ic}</div>
                <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{lbl}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{desc}</div>
              </button>
            ))}
          </div>
          <button onClick={()=>mode&&setStep("area")} disabled={!mode}
            style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:mode?"var(--orange)":"var(--border)",color:mode?"#fff":"var(--muted)",fontSize:15,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
            CONTINUAR →
          </button>
        </div>
      )}

      {step==="area"&&(
        <div className="au">
          <div style={{fontSize:12,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Área a trabajar</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
            {AREAS.map(a=>(
              <button key={a.id} onClick={()=>setArea(a.id)}
                style={{padding:"16px 12px",borderRadius:12,border:`2px solid ${area===a.id?"var(--blue)":"var(--border)"}`,
                  background:area===a.id?"rgba(83,82,237,.08)":"var(--card)",color:area===a.id?"var(--blue)":"var(--sub)",textAlign:"left",cursor:"pointer"}}>
                <div style={{fontSize:26,marginBottom:6}}>{a.icon}</div>
                <div style={{fontSize:14,fontWeight:700}}>{a.label}</div>
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep("mode")} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid var(--border)",background:"none",color:"var(--muted)",fontSize:14}}>← Atrás</button>
            <button onClick={()=>area&&setStep("config")} disabled={!area}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:area?"var(--blue)":"var(--border)",color:area?"#fff":"var(--muted)",fontSize:14,fontWeight:700}}>
              CONTINUAR →
            </button>
          </div>
        </div>
      )}

      {step==="config"&&(
        <div className="au">
          <PlayerConfig player={p1} onChange={setP1} label={mode==="coop"?"Jugador 1":"Tú"} color={COLORS[0]}/>
          {mode==="coop"&&<>
            <div style={{height:1,background:"var(--border)",margin:"8px 0 16px"}}/>
            <PlayerConfig player={p2} onChange={setP2} label="Jugador 2" color={COLORS[1]}/>
          </>}
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button onClick={()=>setStep("area")} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid var(--border)",background:"none",color:"var(--muted)",fontSize:14}}>← Atrás</button>
            <button onClick={()=>setStep("preview")}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"var(--orange)",color:"#fff",fontSize:14,fontWeight:700}}>
              VER PLAN →
            </button>
          </div>
        </div>
      )}

      {step==="preview"&&(
        <div className="au">
          {players.map((p,pi)=>(
            <div key={pi} style={{marginBottom:20}}>
              {players.length>1&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:p.color}}/>
                <div className="D" style={{fontSize:18,fontWeight:800,color:p.color}}>{p.name}</div>
                <div style={{fontSize:12,color:"var(--muted)",marginLeft:4}}>
                  {RANKS.find(r=>r.id===(pi===0?p1.rankId:p2.rankId))?.label} · {AREAS.find(a=>a.id===area)?.label}
                </div>
              </div>}
              {p.plan.length===0
                ?<div style={{padding:"14px",background:"var(--card)",borderRadius:10,fontSize:13,color:"var(--muted)",textAlign:"center",border:"1px solid var(--border)"}}>
                  Sin errores — ¡buena sesión!
                </div>
                :p.plan.map(ex=>(
                  <div key={ex.exId} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"var(--card)",borderRadius:8,border:"1px solid var(--border)",marginBottom:6}}>
                    <span style={{fontSize:20}}>{ex.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600}}>{ex.name}</div>
                      <div style={{fontSize:10,color:"var(--muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ex.errLabels?.join(" · ")}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div className="D" style={{fontSize:18,fontWeight:700,color:p.color}}>{ex.sets}×{ex.baseReps}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{ex.unit}</div>
                    </div>
                  </div>
                ))
              }
              {p.plan.length>0&&<div style={{fontSize:11,color:"var(--muted)",textAlign:"right",marginTop:4}}>
                {p.plan.reduce((a,e)=>a+e.sets,0)} series · ~{Math.round(p.plan.reduce((a,e)=>a+e.sets,0)*1.5)} min
              </div>}
            </div>
          ))}
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button onClick={()=>setStep("config")} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid var(--border)",background:"none",color:"var(--muted)",fontSize:14}}>← Ajustar</button>
            <button onClick={()=>onStart(players)} disabled={!canStart}
              style={{flex:2,padding:"14px",borderRadius:12,border:"none",
                background:canStart?"linear-gradient(135deg,var(--orange),var(--red))":"var(--border)",
                color:canStart?"#fff":"var(--muted)",fontSize:16,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
              EMPEZAR →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function HistoryScreen({history,onBack}){
  if(history.length===0)return(
    <div style={{padding:24,textAlign:"center",paddingTop:60}}>
      <div style={{fontSize:48,marginBottom:12}}>📋</div>
      <div className="D" style={{fontSize:28,fontWeight:800,color:"var(--sub)"}}>Sin historial</div>
      <div style={{fontSize:13,color:"var(--muted)",marginTop:8,marginBottom:24}}>Completa tu primer workout</div>
      <button onClick={onBack} style={{padding:"10px 24px",borderRadius:8,border:"1px solid var(--border)",background:"none",color:"var(--sub)",fontSize:13}}>← Volver</button>
    </div>
  );
  return(
    <div style={{maxWidth:520,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid var(--border)",borderRadius:8,padding:"6px 12px",color:"var(--sub)",fontSize:13,cursor:"pointer"}}>← Volver</button>
        <div className="D" style={{fontSize:28,fontWeight:800}}>Historial</div>
      </div>
      {[...history].reverse().map((entry,i)=>(
        <div key={i} style={{background:"var(--card)",borderRadius:10,padding:"14px 16px",marginBottom:8,border:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:700}}>{entry.date}</div>
              <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{entry.mode==="coop"?"👥 Cooperativo":"👤 Individual"} · {entry.sets} series</div>
            </div>
            <div className="D" style={{fontSize:26,fontWeight:900,color:entry.completed?"var(--green)":"var(--muted)"}}>{entry.completed?"✓":"✕"}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("setup");
  const [players,setPlayers]=useState([]);
  const [history,setHistory]=useState(loadHistory);

  const startWorkout=(p)=>{setPlayers(p);setScreen("execution");};
  const finishWorkout=(completed=true)=>{
    const entry={
      date:new Date().toLocaleDateString("es-ES")+" · "+new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),
      mode:players.length>1?"coop":"individual",
      sets:players.reduce((a,p)=>a+p.plan.reduce((b,e)=>b+e.sets,0),0),
      completed
    };
    const newH=[...history,entry];
    setHistory(newH);saveHistory(newH);
    setScreen("setup");
  };

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,10,15,.92)",backdropFilter:"blur(12px)",borderBottom:"1px solid var(--border)",padding:"9px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div className="D" style={{fontSize:16,fontWeight:800,letterSpacing:.5}}>🏋️ RL WORKOUT</div>
          <a href="../" style={{fontSize:11,color:"var(--muted)",textDecoration:"none",border:"1px solid var(--border)",borderRadius:5,padding:"3px 8px"}}
            onMouseEnter={e=>e.currentTarget.style.color="var(--sub)"}
            onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>
            🚗 RL Tracker
          </a>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["setup","Workout"],["history",`Historial${history.length>0?" ("+history.length+")":""}`]].map(([s,lbl])=>(
            <button key={s} onClick={()=>setScreen(s)}
              style={{padding:"5px 11px",borderRadius:6,border:`1px solid ${screen===s?"var(--orange)":"var(--border)"}`,background:screen===s?"rgba(255,107,53,.1)":"none",color:screen===s?"var(--orange)":"var(--sub)",fontSize:12,cursor:"pointer"}}>
              {lbl}
            </button>
          ))}
        </div>
      </div>
      {screen==="setup"&&<SetupScreen onStart={startWorkout}/>}
      {screen==="execution"&&<ExecutionScreen players={players} onFinish={finishWorkout}/>}
      {screen==="history"&&<HistoryScreen history={history} onBack={()=>setScreen("setup")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
