function getRankTable(config, modeId) {
  const mins = config[modeId] || DEFAULT_MODE_RANKS[modeId] || DEFAULT_MODE_RANKS["3v3"];
  return RANK_DEFS.map((r, i) => ({ ...r, min: mins[i] ?? 0 }));
}
function getRank(mmr, modeId, config) {
  const table = getRankTable(config, modeId);
  return table.find(r => mmr >= r.min) || table[table.length - 1];
}
function getNextRank(mmr, modeId, config) {
  const table = getRankTable(config, modeId);
  const idx = table.findIndex(r => mmr >= r.min);
  if(idx <= 0) return null; // already SSL or not found
  const next = table[idx - 1];
  return { ...next, gap: next.min - mmr };
}

function getModeErrors(mode,custom={}){
  const base=mode.group==="standard"?STD_ERRORS:[...SPE_GENERIC,...(SPE_SPECIFIC[mode.id]||[])];

  // Apply edits to predefined
  const edited=base.map(e=>{const ov=modeCustom.errorOverrides?.[e.id];return ov?{...e,label:ov}:e;}).filter(e=>!(modeCustom.errorDeleted||[]).includes(e.id));
  // Add custom extras
  return [...edited,...(modeCustom.errors||[])];
}

const AIKEY = 'rlt3f_aikey';
function getAIKey(){ try{ return localStorage.getItem(AIKEY)||''; }catch{ return ''; } }
function setAIKey(k){ localStorage.setItem(AIKEY, k); }

function cleanSummary(text){
  if(!text) return text;
  return text
    .replace(/^#{1,3} /gm, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/^[-*] /gm, '• ')
    .split('\n').filter(l=>l.trim()).join('\n')
    .trim();
}

async function generateSummary(prompt){
  const key = getAIKey();
  if(!key) return '__NO_KEY__';
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{role:'user',content:prompt}]
      })
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      return '__ERROR__: '+(err?.error?.message||res.status);
    }
    const data = await res.json();
    return cleanSummary(data.content?.[0]?.text) || null;
  }catch(e){ return '__ERROR__: '+e.message; }
}

async function generateMatchSummary(match, mode, errors, hits){
  const errList = errors.filter(e=>(match.errors[e.id]||0)>0).map(e=>`${e.label}(×${match.errors[e.id]})`).join(', ')||'ninguno';
  const hitList = hits.filter(h=>(match.hits?.[h.id]||0)>0).map(h=>`${h.label}(×${match.hits[h.id]})`).join(', ')||'ninguno';
  const customHit = match.customHit?.label ? `${match.customHit.label}(×${match.customHit.count||0})` : '';
  const mec = match.mecanica?.label ? `${match.mecanica.label}: ${match.mecanica.logradas||0}/${match.mecanica.intentos||0} veces` : 'ninguna';
  const res = match.result==='win'?'Victoria':match.result==='mvp'?'MVP':match.result==='loss'?'Derrota':'Empate';
  const score = match.score?`${match.score.us}-${match.score.them}`:'sin marcador';
  const prompt = `Eres un coach de Rocket League. Resume esta partida en 3 frases cortas en español, siendo directo y constructivo. 
Modo: ${mode.name} | Resultado: ${res} ${score}
Errores: ${errList}
Aciertos: ${hitList}${customHit?' + '+customHit:''}
Mecánica trabajada: ${mec}
Formato: 1 frase sobre lo positivo, 1 sobre lo negativo, 1 recomendación concreta. Sin emojis.`;
  return generateSummary(prompt);
}

async function generateBatchSummaries(sessions, onProgress){
  const results = [];
  for(let i=0; i<sessions.length; i++){
    const s = sessions[i];
    if(s.sessionSummary && !s.sessionSummary.startsWith('__')) { results.push(s); onProgress(i+1, sessions.length); continue; }
    const mode = MODES.find(m=>m.id===s.modeId)||{name:s.modeName,group:'standard'};
    const errors = getModeErrors(mode,{});
    const hits = getModeHits(mode,{});
    // Generate per-match summaries
    const updatedMatches = [];
    for(const m of s.matches){
      if(m.summary && !m.summary.startsWith('__')){ updatedMatches.push(m); continue; }
      const sum = await generateMatchSummary(m, mode, errors, hits);
      updatedMatches.push({...m, summary: sum||null});
    }
    // Generate session summary
    const sessionSum = await generateSessionSummary(updatedMatches, mode, errors, hits);
    results.push({...s, matches: updatedMatches, sessionSummary: sessionSum||null});
    onProgress(i+1, sessions.length);
    // Small delay to avoid rate limiting
    await new Promise(r=>setTimeout(r,300));
  }
  return results;
}

async function generateSessionSummary(matches, mode, errors, hits){
  const totErr={}, totHit={};
  errors.forEach(e=>{ totErr[e.label]=matches.reduce((a,m)=>a+(m.errors?.[e.id]||0),0); });
  hits.forEach(h=>{ totHit[h.label]=matches.reduce((a,m)=>a+(m.hits?.[h.id]||0),0); });
  const wins=matches.filter(m=>m.result==='win'||m.result==='mvp').length;
  const topErr=Object.entries(totErr).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([l,v])=>`${l}(${v})`).join(', ')||'ninguno';
  const topHit=Object.entries(totHit).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([l,v])=>`${l}(${v})`).join(', ')||'ninguno';
  const mecList=[...new Set(matches.filter(m=>m.mecanica?.label).map(m=>`${m.mecanica.label}: ${m.mecanica.logradas||0}/${m.mecanica.intentos||0}`))].join(', ')||'ninguna';
  const prompt = `Eres un coach de Rocket League. Resume esta sesión en 4 frases en español, siendo directo y motivador.
Modo: ${mode.name} | ${matches.length} partidas | ${wins}V/${matches.length-wins}L
Errores más frecuentes: ${topErr}
Aciertos más repetidos: ${topHit}
Mecánicas trabajadas: ${mecList}
Formato: 1 frase sobre el rendimiento general, 1 sobre el mayor logro, 1 sobre el mayor error, 1 recomendación para la próxima sesión. Sin emojis.`;
  return generateSummary(prompt);
}

const C={
  bg:"#111214",surface:"#1e1f2e",card:"#252636",hover:"#2e2f42",border:"#2e3050",
  text:"#ffffff",sub:"#b9bbbe",muted:"#72767d",

function Sparkline({data,color,height=40}){
  const [hovered,setHovered]=React.useState(null);
  if(data.length<2)return(<div style={{height,display:"flex",alignItems:"center",color:"#4a4f6a",fontSize:11}}>Sin historial aún</div>);
  const W=300,H=height,P=6;
  const vals=data.map(d=>d.mmr),mn=Math.min(...vals)-5,mx=Math.max(...vals)+5,rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1))*(W-P*2),y:H-P-((d.mmr-mn)/rng)*(H-P*2),mmr:d.mmr,date:d.date}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=path+` L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  const gid="gx"+color.replace("#","");
  return(
    <div style={{position:"relative"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient></defs>
        <path d={area} fill={`url(#${gid})`}/>
        <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)} style={{cursor:"pointer"}}>
            {/* Hit area invisible */}
            <circle cx={p.x} cy={p.y} r={10} fill="transparent"/>
            {/* Visible dot */}
            <circle cx={p.x} cy={p.y} r={hovered===i?5:3}
              fill={hovered===i?"#fff":color}
              stroke={color} strokeWidth={hovered===i?2:0}
              style={{transition:"r .1s"}}/>
            {/* Tooltip */}
            {hovered===i&&(()=>{
              const tipW=80, tipH=36;
              const tx=Math.min(Math.max(p.x-tipW/2,2),W-tipW-2);
              const ty=p.y-tipH-8 < 0 ? p.y+10 : p.y-tipH-8;
              return(
                <g>
                  <rect x={tx} y={ty} width={tipW} height={tipH} rx={5}
                    fill="#1e1f2e" stroke={color} strokeWidth="1" opacity="0.97"/>
                  <text x={tx+tipW/2} y={ty+14} textAnchor="middle"
                    fill={color} fontSize="12" fontWeight="700" fontFamily="'DM Mono',monospace">
                    {p.mmr} MMR
                  </text>
                  <text x={tx+tipW/2} y={ty+27} textAnchor="middle"
                    fill="#72767d" fontSize="9" fontFamily="'DM Sans',sans-serif">
                    {p.date}
                  </text>
                </g>
              );
            })()}
          </g>
        ))}
      </svg>
    </div>
  );
}

  const map={win:["Victoria",C.green],mvp:["MVP 👑",C.amber],loss:["Derrota",C.red],draw:["Empate","#7289da"]};
  const [l,col]=map[result]||["—",C.muted];
  return <Tag color={col}>{l}</Tag>;
};
const ScoreBadge=({score})=>{
  if(!score)return <span style={{color:C.muted,fontSize:12}}>—</span>;
  const col=score.us>score.them?C.green:score.us<score.them?C.red:"#7289da";
  return <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:col}}>{score.us}–{score.them}</span>;
};

        <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.6,background:`${C.amber}10`,borderRadius:8,padding:"10px 12px",border:`1px solid ${C.amber}30`}}>

function IaTab({sessions=[], onUpdateSessions}){
  const [running,  setRunning]  = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [total,    setTotal]    = React.useState(0);
  const [done,     setDone]     = React.useState(false);
  const [errMsg,   setErrMsg]   = React.useState('');
  const hasKey = !!getAIKey();
  const sessionsWithout = sessions.filter(s=>!s.sessionSummary||s.sessionSummary.startsWith('__')).length;

  const runBatch = async () => {
    if(!hasKey){ setErrMsg('Sin API Key. Confígurala en ⚙ Config → campo "API Key de Claude".'); return; }
    setRunning(true); setDone(false); setErrMsg(''); setProgress(0); setTotal(sessions.length);
    try{
      const updated = await generateBatchSummaries(sessions, (done,tot)=>{ setProgress(done); setTotal(tot); });
      onUpdateSessions&&onUpdateSessions(updated);
      setDone(true);
    }catch(e){ setErrMsg('Error: '+e.message); }
    setRunning(false);
  };

  const pct = total>0?Math.round(progress/total*100):0;

  return(
    <div style={{maxWidth:540}}>
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>🤖 Resúmenes IA en batch</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:20}}>
          Genera resúmenes con Claude para todas tus sesiones y partidas existentes. Se guardan permanentemente.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
          {[["Total",sessions.length,C.text],["Sin resumen",sessionsWithout,C.amber],["Con resumen",sessions.length-sessionsWithout,C.green]].map(([l,v,col])=>(
            <div key={l} style={{background:C.surface,borderRadius:8,padding:"12px",border:`1px solid ${C.border}`,textAlign:"center"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:24,fontWeight:700,color:col}}>{v}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>{l}</div>
            </div>
          ))}
        </div>
        {!hasKey&&<div style={{background:`${C.amber}10`,border:`1px solid ${C.amber}30`,borderRadius:8,padding:"12px",fontSize:12,color:C.amber,marginBottom:16}}>
          ⚠ Configura tu API Key de Claude primero. Cierra este modal → Sidebar → ⚙ Config → campo "API Key de Claude".
        </div>}
        {running&&<div style={{marginBottom:16}}>

// ─── CLOUD SYNC (JSONBin) ────────────────────────────────────────────────────

const JKEY = 'rlt3f_jcfg'; // local device config: {apiKey, binId}

function getCloudCfg() {
  try { const s = localStorage.getItem(JKEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveCloudCfg(cfg) { localStorage.setItem(JKEY, JSON.stringify(cfg)); }

function bundleData(sessions, mmrHist, tournaments, config) {
  return { sessions, mmrHistory: mmrHist, tournaments, config, lastSync: Date.now() };
}
function unbundleData(record) {
  return {
    sessions:    record.sessions    || [],
    mmrHistory:  record.mmrHistory  || {},
    tournaments: record.tournaments || [],
    config:      record.config      || {},
  };
}

async function pushToCloud(bundle) {
  const cfg = getCloudCfg();
  if (!cfg || !cfg.apiKey || !cfg.binId) return { ok: false, reason: 'no_config' };
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey },
      body: JSON.stringify(bundle)
    });
    return { ok: res.ok, status: res.status };
  } catch (e) { return { ok: false, reason: 'network' }; }
}

async function pullFromCloud() {
  const cfg = getCloudCfg();
  if (!cfg || !cfg.apiKey || !cfg.binId) return null;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: { 'X-Master-Key': cfg.apiKey }
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.record || null;
  } catch { return null; }
}

function ImportExportModal({ onClose, onImport }) {
  const [status, setStatus] = useState('');

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const bundle = {};
        if (data.rlt3_s)   bundle.sessions    = data.rlt3_s;
        if (data.rlt3_m)   bundle.mmrHistory  = data.rlt3_m;
        if (data.rlt3_t)   bundle.tournaments = data.rlt3_t;
        if (data.rlt3_cfg) bundle.config      = data.rlt3_cfg;
        // Also support direct bundle format
        if (data.sessions)    bundle.sessions    = bundle.sessions    || data.sessions;
        if (data.mmrHistory)  bundle.mmrHistory  = bundle.mmrHistory  || data.mmrHistory;
        if (data.tournaments) bundle.tournaments = bundle.tournaments || data.tournaments;
        if (data.config)      bundle.config      = bundle.config      || data.config;
        const keys = Object.keys(bundle).length;
        if (keys === 0) { setStatus('✕ Formato no reconocido.'); return; }
        onImport(bundle);
        setStatus(`✓ ${keys} secciones importadas correctamente.`);
        setTimeout(onClose, 1500);
      } catch { setStatus('✕ Archivo JSON inválido.'); }
    };
    reader.readAsText(file);
  };

  const exportNow = () => {
    const bundle = {
      exportDate: new Date().toISOString(),
      version: 'v7',
      rlt3_s:   JSON.parse(localStorage.getItem('rlt3f_s')  || '[]'),
      rlt3_m:   JSON.parse(localStorage.getItem('rlt3f_m')  || '{}'),
      rlt3_t:   JSON.parse(localStorage.getItem('rlt3f_t')  || '[]'),
      rlt3_cfg: JSON.parse(localStorage.getItem('rlt3f_cfg')|| '{}'),
    };
    const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `rl-tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    setStatus('✓ Backup descargado.');
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000}} onClick={onClose}>
      <div style={{background:C.surface,borderRadius:16,padding:'28px',width:400,border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,color:C.text,fontSize:16,marginBottom:4}}>📦 Importar / Exportar</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Migra datos desde el proyecto Vite o haz un backup manual</div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>Importar desde JSON</div>
          <label style={{display:'block',padding:'12px',border:`2px dashed ${C.border}`,borderRadius:8,textAlign:'center',cursor:'pointer',color:C.muted,fontSize:13}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.blue} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            Clic para seleccionar archivo JSON
            <input type="file" accept=".json" onChange={handleFile} style={{display:'none'}}/>
          </label>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>Exportar backup</div>
          <button onClick={exportNow} style={{width:'100%',padding:'10px',background:C.hover,border:`1px solid ${C.border}`,borderRadius:8,color:C.sub,fontSize:13,cursor:'pointer',fontWeight:500}}>
            ⬇ Descargar rl-tracker-backup.json
          </button>
        </div>

        {status && <div style={{padding:'10px',borderRadius:8,background:status.startsWith('✓')?`${C.green}15`:`${C.red}15`,color:status.startsWith('✓')?C.green:C.red,fontSize:13,marginBottom:14}}>{status}</div>}

        <button onClick={onClose} style={{width:'100%',padding:'10px',background:'none',border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,cursor:'pointer'}}>Cerrar</button>
      </div>
    </div>
  );
}

              const mmr=getLatestMMR(mmrHistory,m.id,m.initMMR),rank=getRank(mmr,m.id,config),trend=getMMRTrend(mmrHistory,m.id);
              const mS=sessions.filter(s=>s.modeId===m.id),mM=mS.reduce((a,s)=>a+s.matches.length,0),mW=mS.reduce((a,s)=>a+s.matches.filter(isWin).length,0);

                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:isStd?38:30,height:isStd?38:30,borderRadius:10,background:`${m.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isStd?20:16}}>{m.icon}</div>
                      <div>
                        <div style={{fontSize:isStd?14:13,fontWeight:600,color:C.text}}>{m.name}</div>
                        <div style={{fontSize:11,color:rank.color,fontWeight:500}}>{rank.name}</div>
                        {nextRank&&<div style={{fontSize:10,color:C.muted,marginTop:1}}>→ {nextRank.name} <span style={{color:C.amber,fontWeight:600}}>+{nextRank.gap}</span></div>}
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:isStd?24:20,fontWeight:700,color:C.text}}>{mmr}</div>
                      {trend!==0&&<div style={{fontSize:11,color:trend>0?C.green:C.red}}>{trend>0?"▲ +":"▼ "}{trend}</div>}
                    </div>
                  </div>
                  {isStd&&<Sparkline data={mmrHistory[m.id]||[]} color={m.color} height={36}/>}
                  <div style={{display:"flex",gap:10,marginTop:isStd?10:8,paddingTop:isStd?10:8,borderTop:`1px solid ${C.border}`}}>
                    <span style={{fontSize:11,color:C.muted}}>{mS.length} ses.</span>
                    <span style={{fontSize:11,color:C.muted}}>·</span>
                    <span style={{fontSize:11,color:C.muted}}>{mM>0?`${Math.round(mW/mM*100)}% win`:"Sin partidas"}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function AddMatchToSession({session, mode, errors, hits, duel, onSave}){
  const [open, setOpen] = useState(false);
  const [currE, setCurrE] = useState({});
  const [currH, setCurrH] = useState({});
  const [currR, setCurrR] = useState(null);
  const [scoreUs, setScoreUs] = useState("");
  const [scoreThem, setScoreThem] = useState("");
  const [myGoals, setMyGoals] = useState("");
  const [myAssists, setMyAssists] = useState("");
  const [mySaves, setMySaves] = useState("");
  const [mecLabel, setMecLabel] = useState("");
  const [mecIntentos, setMecIntentos] = useState(0);
  const [mecLogradas, setMecLogradas] = useState(0);

  const reset = () => {
    setCurrE({}); setCurrH({}); setCurrR(null);
    setScoreUs(""); setScoreThem("");
    setMyGoals(""); setMyAssists(""); setMySaves("");
    setMecLabel(""); setMecIntentos(0); setMecLogradas(0);
  };

  const save = () => {
    if(!currR) return;
    const score = scoreUs!==""&&scoreThem!==""?{us:Number(scoreUs),them:Number(scoreThem)}:null;
    const mecanica = mecLabel?{label:mecLabel,intentos:mecIntentos,logradas:mecLogradas}:null;
    const newMatch = {id:Date.now(),result:currR,errors:{...currE},hits:{...currH},
      score, mecanica, customHit:null, summary:null,
      myGoals:!duel&&myGoals!==""?Number(myGoals):null,
      myAssists:!duel&&myAssists!==""?Number(myAssists):null,
      mySaves:!duel&&mySaves!==""?Number(mySaves):null};
    onSave(newMatch);
    reset();
    setOpen(false);

  const currEtot = Object.values(currE).reduce((a,b)=>a+b,0);

    <div style={{marginBottom:16}}>

        <span style={{fontSize:11,color:C.muted}}>{open?"▲ Cancelar":"▼ Abrir"}</span>

      {open&&<div style={{background:C.card,border:`1px solid ${mode.color}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"20px"}}>

          <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Resultado</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {[["win","Victoria",C.green],["mvp","MVP 👑",C.amber],["loss","Derrota",C.red],["draw","Empate","#7289da"]].map(([v,l,col])=>(
              <button key={v} onClick={()=>setCurrR(currR===v?null:v)}
                style={{padding:"10px 4px",borderRadius:8,border:`1.5px solid ${currR===v?col:C.border}`,background:currR===v?`${col}15`:"none",color:currR===v?col:C.sub,fontSize:13,fontWeight:currR===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>
        {/* Score + personal stats */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Marcador (opcional)</div>
          <PersonalStatFields duel={duel} scoreUs={scoreUs} setScoreUs={setScoreUs} scoreThem={scoreThem} setScoreThem={setScoreThem} myGoals={myGoals} setMyGoals={setMyGoals} myAssists={myAssists} setMyAssists={setMyAssists} mySaves={mySaves} setMySaves={setMySaves}/>
        </div>
        {/* Errors */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.red,fontWeight:600,marginBottom:8}}>Errores {currEtot>0&&<span style={{color:C.text}}>({currEtot})</span>}</div>

                <span style={{fontSize:11,color:C.muted,flex:1}}>{e.label}</span>
                <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                  <button onClick={()=>setCurrE(p=>({...p,[e.id]:Math.max(0,(p[e.id]||0)-1)}))} disabled={cnt===0} style={{width:22,height:22,borderRadius:4,border:`1px solid ${C.border}`,background:C.hover,color:C.muted,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>

                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:cnt>0?C.green:C.muted,minWidth:16,textAlign:"center"}}>{cnt}</span>
                  <button onClick={()=>setCurrH(p=>({...p,[h.id]:(p[h.id]||0)+1}))} style={{width:22,height:22,borderRadius:4,border:`1px solid ${C.green}40`,background:`${C.green}15`,color:C.green,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
            );})}
          </div>
        </div>
        {/* Mecánica */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.blue,fontWeight:600,marginBottom:8}}>Mecánica (opcional)</div>
          <input value={mecLabel} onChange={e=>setMecLabel(e.target.value)} placeholder="Ej: Aerial doble toque..."
            style={{width:"100%",background:C.surface,border:`1px solid ${mecLabel?`${C.blue}40`:C.border}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:12,outline:"none",marginBottom:mecLabel?8:0}}/>
          {mecLabel&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
            {[["Intentos",mecIntentos,setMecIntentos,C.sub],["Logradas",mecLogradas,setMecLogradas,C.blue]].map(([label,val,setter,col])=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
                <span style={{fontSize:11,color:C.muted}}>{label}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>

function SessionDetailPage({session,config,custom={},onBack,onUpdateSession}){
  const mode=MODES.find(m=>m.id===session.modeId)||{name:session.modeName,color:C.blue,icon:"🎮"};
  const errors=getModeErrors(mode,custom),hits=getModeHits(mode,custom),duel=is1v1(session.modeId);
  const [editing,setEditing]=useState(false),[draft,setDraft]=useState(null);
  const startEdit=()=>{setDraft(JSON.parse(JSON.stringify(session)));setEditing(true);};
  const cancelEdit=()=>{setDraft(null);setEditing(false);};
  const saveEdit=()=>{onUpdateSession(draft);setEditing(false);setDraft(null);};
  const setMF=(idx,field,val)=>{
    setDraft(prev=>{
      const matches=prev.matches.map((m,i)=>{
        if(i!==idx)return m;
        if(field==="scoreUs")return {...m,score:{...m.score,us:val===""?null:Number(val)}};
        if(field==="scoreThem")return {...m,score:{...m.score,them:val===""?null:Number(val)}};
        if(["myGoals","myAssists","mySaves"].includes(field))return {...m,[field]:val===""?null:Number(val)};
        if(field==="result")return {...m,result:val};
        if(field.startsWith("err_")){const eid=field.replace("err_","");return {...m,errors:{...m.errors,[eid]:val===""?0:Number(val)}};}
        return m;
      });
      return {...prev,matches};
    });
  };
  const setMMRF=(field,val)=>setDraft(prev=>({...prev,[field]:val===""?null:Number(val)}));
  const src=editing?draft:session;
  const wins=src.matches.filter(isWin).length,losses=src.matches.filter(m=>m.result==="loss").length,draws=src.matches.filter(m=>m.result==="draw").length;
  const detailHits=getModeHits(mode);
  const gf=src.matches.reduce((a,m)=>a+(m.score?.us||0),0),ga=src.matches.reduce((a,m)=>a+(m.score?.them||0),0);
  const mg=!duel?src.matches.reduce((a,m)=>a+(m.myGoals||0),0):null;
  const ma=!duel?src.matches.reduce((a,m)=>a+(m.myAssists||0),0):null;
  const ms=!duel?src.matches.reduce((a,m)=>a+(m.mySaves||0),0):null;
  const mmrDelta=src.endMMR&&src.startMMR?src.endMMR-src.startMMR:null;
  const totE=src.matches.reduce((tot,m)=>{errors.forEach(e=>{tot[e.id]=(tot[e.id]||0)+(m.errors[e.id]||0);});return tot;},{});
  return(
    <div style={{padding:"32px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <GhostBtn onClick={onBack}>← Volver</GhostBtn>
        <div style={{width:44,height:44,borderRadius:12,background:`${mode.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{mode.icon}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <h1 style={{fontSize:22,fontWeight:700,color:C.text}}>{mode.name}</h1>
            {src.isPlacement&&<Tag color={C.amber}>Posicionamiento</Tag>}
          </div>
          <p style={{fontSize:13,color:C.muted}}>{src.date}{src.time&&src.time!=="Posicionamiento"&&` · ${src.time}`}</p>
        </div>
        {editing
          ?<div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:4}}>MMR inicio</div><NumInput value={draft.startMMR??""} onChange={v=>setMMRF("startMMR",v)} placeholder="—" style={{width:90}}/></div>
            <div><div style={{fontSize:11,color:C.muted,marginBottom:4}}>MMR final</div><NumInput value={draft.endMMR??""} onChange={v=>setMMRF("endMMR",v)} placeholder="—" style={{width:90}}/></div>
          </div>
          :mmrDelta!==null&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:2}}>MMR</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:mmrDelta>=0?C.green:C.red}}>{mmrDelta>=0?"+":""}{mmrDelta}</div>
            <div style={{fontSize:11,color:C.muted}}>{src.startMMR} → {src.endMMR}</div>
          </div>}
        <div style={{display:"flex",gap:8}}>
          {editing
            ?<><GhostBtn onClick={cancelEdit}>Cancelar</GhostBtn><button onClick={saveEdit} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:700}}>✓ Guardar</button></>
            :<GhostBtn onClick={startEdit} color={C.blue}>✏️ Editar sesión</GhostBtn>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:8,marginBottom:20}}>
        {[["Partidas",src.matches.length,C.text],["Victorias",wins,C.green],["Derrotas",losses,C.red],["Empates",draws,"#7289da"],["GF–GC",`${gf}–${ga}`,C.sub],...(!duel?[["⚽ Goles",mg??0,C.green],["🎯 Asist.",ma??0,C.blue],["🧤 Salvadas",ms??0,C.teal]]:[])].map(([l,v,col])=>(
          <Card key={l} style={{padding:"12px 14px"}}><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:.7,marginBottom:4}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:col,lineHeight:1}}>{v}</div></Card>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {src.sessionSummary&&!src.sessionSummary.startsWith('__')&&
          <CollapsibleSummary summary={src.sessionSummary} label="💬 Análisis IA — Resumen de sesión"/>}

          {src.matches.map((m,i)=>{
            const et=Object.values(m.errors).reduce((a,b)=>a+b,0);
            const errLabels=errors.filter(e=>(m.errors[e.id]||0)>0).map(e=>`${e.label} ×${m.errors[e.id]}`);
            if(editing)return(
              <div key={m.id} style={{border:`1px solid ${C.border}`,borderRadius:10,padding:"14px",marginBottom:10,background:C.surface}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.muted,minWidth:24}}>P{i+1}</span>
                  <select value={m.result} onChange={e=>setMF(i,"result",e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 10px",color:C.text,fontSize:13,cursor:"pointer"}}>
                    {["win","mvp","loss","draw"].map(r=><option key={r} value={r}>{r==="win"?"Victoria":r==="mvp"?"MVP":r==="loss"?"Derrota":"Empate"}</option>)}
                  </select>

            return(

                <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",flexWrap:"wrap"}}>

                  {!duel&&<>{m.myGoals!=null&&<Tag color={C.green}>⚽ {m.myGoals}</Tag>}{m.myAssists!=null&&<Tag color={C.blue}>🎯 {m.myAssists}</Tag>}{m.mySaves!=null&&<Tag color={C.teal}>🧤 {m.mySaves}</Tag>}</>}
                  {et>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.red,marginLeft:"auto"}}>{et} err</span>}
                  {(()=>{const th=Object.values(m.hits||{}).reduce((a,b)=>a+b,0)+(m.customHit?.count||0);return th>0?<Tag color={C.green}>{th} ✓</Tag>:null;})()}
                </div>
                {errLabels.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,paddingBottom:4,paddingLeft:36}}>{errLabels.map((l,j)=><span key={j} style={{background:`${C.red}15`,color:C.red,borderRadius:4,padding:"2px 8px",fontSize:11}}>{l}</span>)}</div>}
                {m.mecanica?.label&&<div style={{paddingLeft:36,paddingBottom:4,fontSize:11,color:C.blue}}>🎯 {m.mecanica.label}: <strong>{m.mecanica.logradas}/{m.mecanica.intentos}</strong> ({m.mecanica.intentos>0?Math.round(m.mecanica.logradas/m.mecanica.intentos*100):0}%)</div>}
                
              </div>

          })}
        </HistorialSection>
          <AddMatchToSession

            onSave={(newMatch)=>{

            }}/>

              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`,paddingLeft:isFocus?8:0,borderLeft:isFocus?`2px solid ${mode.color}`:"none"}}>
                <div><div style={{fontSize:12,color:isFocus?mode.color:C.sub}}>{e.label}</div>{isFocus&&<div style={{fontSize:10,color:mode.color}}>Foco</div>}</div>
                <div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:tot>0?C.text:C.muted}}>{tot}</div><div style={{fontSize:10,color:C.muted}}>{src.matches.length>0?(tot/src.matches.length).toFixed(1):0}/p</div></div>
              </div>
            );})}
          </Card>
          {mmrDelta!==null&&<Card style={{borderColor:mmrDelta>=0?`${C.green}40`:`${C.red}40`}}>
            <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:12}}>Progresión MMR</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["Inicio",src.startMMR??"-",C.muted],["Final",src.endMMR??"-",C.text],["Delta",(mmrDelta>=0?"+":"")+mmrDelta,mmrDelta>=0?C.green:C.red]].map(([l,v,col])=>(
                <div key={l}><div style={{fontSize:11,color:C.muted}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:col}}>{v}</div></div>
              ))}
            </div>
          </Card>}
      </div>

    </div>
  );
}

function SessionPage({modeId,sessions,mmrHistory,config,custom={},mechanics={},onSaveMechanics,onSave}){
  const mode=MODES.find(m=>m.id===modeId),errors=getModeErrors(mode,custom),duel=is1v1(modeId);
  const latMMR=getLatestMMR(mmrHistory,modeId,mode.initMMR);
  // Check for existing draft
  const existingDraft=loadDraft(modeId);
  const [showDraftBanner,setShowDraftBanner]=useState(!!existingDraft);
  const [step,setStep]=useState("setup"),[startMMR,setStartMMR]=useState(String(latMMR)),[focusErr,setFocusErr]=useState(null);
  const [matches,setMatches]=useState([]),[endMMR,setEndMMR]=useState(""),[currE,setCurrE]=useState({});
  const [currR,setCurrR]=useState(null),[scoreUs,setScoreUs]=useState(""),[scoreThem,setScoreThem]=useState("");
  const [myGoals,setMyGoals]=useState(""),[myAssists,setMyAssists]=useState(""),[mySaves,setMySaves]=useState("");
  const [currH,setCurrH]=useState({});  // current hits
  const [customHitLabel,setCustomHitLabel]=useState("");
  const [customHitCount,setCustomHitCount]=useState(0);
  const [mecLabel,setMecLabel]=useState("");
  const [mecIntentos,setMecIntentos]=useState(0);
  const [mecLogradas,setMecLogradas]=useState(0);
  const [newMecInput,setNewMecInput]=useState("");

  const [sessionSummary,setSessionSummary]=useState(null);
  const [loadingSessionSummary,setLoadingSessionSummary]=useState(false);
  const [editingMatchIdx,setEditingMatchIdx]=useState(null);
  const [editMatchDraft,setEditMatchDraft]=useState(null);
  const hits=getModeHits(mode,custom);
  const modeMechanics=mechanics[modeId]||[];

  // Auto-save draft on ANY in-progress field change
  React.useEffect(()=>{
    if(step!=="tracking") return;
    saveDraft(modeId,{
      step:"tracking", startMMR, focusErr, matches,
      inProgress:{
        currE:{...currE}, currH:{...currH}, currR,
        scoreUs, scoreThem, myGoals, myAssists, mySaves,
        customHitLabel, customHitCount,
        mecLabel, mecIntentos, mecLogradas
      }
    });
  },[currE, currH, currR, scoreUs, scoreThem, myGoals, myAssists, mySaves,
     customHitLabel, customHitCount, mecLabel, mecIntentos, mecLogradas, matches, step]);
  const totE=matches.reduce((tot,m)=>{errors.forEach(e=>{tot[e.id]=(tot[e.id]||0)+(m.errors[e.id]||0);});return tot;},{});
  const wins=matches.filter(isWin).length,currTot=Object.values(currE).reduce((a,b)=>a+b,0);
  const totalGF=matches.reduce((a,m)=>a+(m.score?.us||0),0),totalGA=matches.reduce((a,m)=>a+(m.score?.them||0),0);
  const totalMG=!duel?matches.reduce((a,m)=>a+(m.myGoals||0),0):null;
  const totalMA=!duel?matches.reduce((a,m)=>a+(m.myAssists||0),0):null;
  const totalMS=!duel?matches.reduce((a,m)=>a+(m.mySaves||0),0):null;
  const addMatch=async()=>{
    if(!currR)return;
    const score=scoreUs!==""&&scoreThem!==""?{us:Number(scoreUs),them:Number(scoreThem)}:null;
    const mecanica=mecLabel?{label:mecLabel,intentos:mecIntentos,logradas:mecLogradas}:null;
    const customHit=customHitLabel?{label:customHitLabel,count:customHitCount}:null;
    const newMatch={id:Date.now(),result:currR,errors:{...currE},hits:{...currH},customHit,mecanica,score,
      myGoals:!duel&&myGoals!==""?Number(myGoals):null,
      myAssists:!duel&&myAssists!==""?Number(myAssists):null,
      mySaves:!duel&&mySaves!==""?Number(mySaves):null,
      summary:null};
    setMatches(p=>[...p,newMatch]);
    setCurrE({});setCurrH({});setCurrR(null);setScoreUs("");setScoreThem("");
    setMyGoals("");setMyAssists("");setMySaves("");
    setCustomHitLabel("");setCustomHitCount(0);setMecLabel("");setMecIntentos(0);setMecLogradas(0);setNewMecInput("");
    // Auto-save draft after each match (clear inProgress since match is now saved)
    saveDraft(modeId,{step:"tracking",startMMR,focusErr,matches:[...matches,newMatch],inProgress:null});
    setMatchSummary(null);
  };
  const saveSession=async()=>{
    setLoadingSessionSummary(true);
    let sSum=null;
    if(getAIKey()){ sSum=await generateSessionSummary(matches,mode,errors,hits); setSessionSummary(sSum); }
    setLoadingSessionSummary(false);
    clearDraft(modeId);
    onSave({id:Date.now(),date:new Date().toLocaleDateString("es-ES"),time:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}),modeId,modeName:mode.name,focusError:focusErr,startMMR:Number(startMMR)||null,endMMR:Number(endMMR)||null,matches,sessionSummary:sSum});
  };
  // Draft banner — shown before setup if pending session exists
  if(showDraftBanner&&existingDraft)return(
    <div style={{padding:"32px",maxWidth:520,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>

            ✕ Descartar y empezar nueva

    </div>
  );

  if(step==="setup")return(
    <div style={{padding:"32px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:44,height:44,borderRadius:12,background:`${mode.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{mode.icon}</div>
        <div><h1 style={{fontSize:24,fontWeight:700,color:C.text}}>{mode.name}</h1><p style={{fontSize:13,color:C.muted}}>Nueva sesión</p></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:20}}>

  const focusDef=focusErr?errors.find(e=>e.id===focusErr):null;

  const prevSessions=sessions.filter(s=>s.modeId===modeId);
  const prevSession=prevSessions.length>0?prevSessions[0]:null; // sessions are newest-first
  const prevComparison=prevSession?errors.map(e=>{
    const currAvg=matches.length>0?(matches.reduce((a,m)=>a+(m.errors[e.id]||0),0)/matches.length):0;

    return{...e,curr:currAvg,prev:prevAvg,delta:currAvg-prevAvg};
  }).filter(e=>e.curr>0||e.prev>0):null;

          {/* HITS SUMMARY */}
          {(()=>{
            const totH=matches.reduce((tot,m)=>{hits.forEach(h=>{tot[h.id]=(tot[h.id]||0)+(m.hits?.[h.id]||0);});return tot;},{});
            const totHits=Object.values(totH).reduce((a,b)=>a+b,0);
            const customHits=matches.filter(m=>m.customHit?.label);
            const totalErrAll=matches.reduce((a,m)=>a+Object.values(m.errors||{}).reduce((x,y)=>x+y,0),0);

            <div style={{fontSize:13,fontWeight:700,color:C.blue,marginBottom:4}}>📊 vs Sesión anterior</div>

                </div>

          {focusDef&&<Card style={{borderColor:improved===true?`${C.green}40`:improved===false?`${C.red}40`:C.border}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:14}}>Error Foco: {focusDef.label}</div>
            <div style={{display:"flex",gap:32,alignItems:"flex-end",flexWrap:"wrap"}}>

              {histAvg===null&&<span style={{fontSize:12,color:C.muted}}>Primera sesión.</span>}

          </Card>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card>

            <NumInput value={endMMR} onChange={setEndMMR} placeholder={startMMR} large/>
            {endMMR&&!isNaN(endMMR)&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,marginBottom:12}}><div style={{width:8,height:8,borderRadius:2,background:getRank(Number(endMMR),modeId,config).color}}/><span style={{fontSize:13,color:getRank(Number(endMMR),modeId,config).color,fontWeight:500}}>{getRank(Number(endMMR),modeId,config).name}</span></div>}
            {mmrDelta!=null&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
              {[["Inicio",startMMR,C.muted],["Final",endMMR,C.text],["Cambio",(mmrDelta>=0?"+":"")+mmrDelta,mmrDelta>=0?C.green:C.red]].map(([l,v,col])=><div key={l}><div style={{fontSize:11,color:C.muted}}>{l}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:col}}>{v}</div></div>)}
            </div>}
          </Card>
          <PrimaryBtn onClick={saveSession} color={mode.color} disabled={loadingSessionSummary}>
            {loadingSessionSummary?"⟳ Analizando...":"💾 Guardar sesión"}
          </PrimaryBtn>
        </div>
      </div>
      {/* Session summary — full width below grid */}
      {loadingSessionSummary&&<div style={{marginTop:16,padding:"12px 16px",background:`${C.amber}10`,border:`1px solid ${C.amber}30`,borderRadius:10,fontSize:13,color:C.amber,textAlign:"center"}}>⟳ Generando resumen IA de sesión...</div>}
      {sessionSummary&&!sessionSummary.startsWith('__')&&

      </div>}
    </div>
  );
}

                  </Card>
                );
              })}
            </div>);
          })()}
        </div>
      </div>
    </div>
  );
}

                        {et>0&&<span style={{fontSize:11,color:C.muted,marginLeft:"auto"}}>{et} err</span>}
                      </div>
                      {errLabels.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,paddingTop:6,paddingLeft:32}}>{errLabels.map((l,j)=><span key={j} style={{background:`${C.red}15`,color:C.red,borderRadius:4,padding:"2px 8px",fontSize:11}}>{l}</span>)}</div>}
                    </div>
                  );
                })}
              </Card>
            ))}
          </div>
          <Card>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:14}}>Errores del torneo</div>
            {terrors.map(e=>{const tot=totTE[e.id]||0;return(
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{fontSize:12,color:tot>0?C.text:C.muted}}>{e.label}</span>
                <div style={{textAlign:"right"}}><div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:tot>0?C.text:C.muted}}>{tot}</div><div style={{fontSize:10,color:C.muted}}>{viewT.matches.length>0?(tot/viewT.matches.length).toFixed(1):0}/p</div></div>
              </div>
            );})}
          </Card>
        </div>
      </div>
    );
  }
  if(view==="new")return(
    <div style={{padding:"32px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <GhostBtn onClick={()=>{setView("list");setMatches([]);resetMatch();}}>← Cancelar</GhostBtn>
        <div style={{width:44,height:44,borderRadius:12,background:`${C.orange}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🏆</div>
        <div style={{flex:1}}><h1 style={{fontSize:22,fontWeight:700,color:C.text}}>Registrar torneo</h1><p style={{fontSize:13,color:C.muted}}>{matches.length} partidas registradas</p></div>
        <PrimaryBtn onClick={saveTournament} color={C.orange} disabled={matches.length===0||!selRank} style={{width:"auto",padding:"10px 20px"}}>💾 Guardar torneo</PrimaryBtn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:20}}>
        <div>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:14}}>Modo y rango</div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Modo de juego</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {MODES.map(m=>(
                  <button key={m.id} onClick={()=>{setSelMode(m.id);setSelRank(null);}}
                    style={{padding:"8px 12px",borderRadius:8,border:`1.5px solid ${selMode===m.id?m.color:C.border}`,background:selMode===m.id?`${m.color}15`:"none",color:selMode===m.id?C.text:C.muted,fontSize:13,fontWeight:selMode===m.id?700:400}}>
                    {m.icon} {m.name}
                  </button>
                ))}
              </div>
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>
              Rango del torneo {selRank&&<span style={{color:RANK_DEFS.find(r=>r.name===selRank)?.color,fontWeight:700}}>· {selRank} ✓</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {rankTable.map(r=>(
                <button key={r.name} onClick={()=>setSelRank(r.name)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${selRank===r.name?r.color:C.border}`,background:selRank===r.name?`${r.color}15`:"none",cursor:"pointer"}}>
                  <div style={{width:8,height:8,borderRadius:2,background:r.color,flexShrink:0}}/>
                  <span style={{fontSize:12,color:selRank===r.name?r.color:C.muted,fontWeight:selRank===r.name?700:400}}>{r.name}</span>
                </button>
              ))}
            </div>
          </Card>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:16}}>Agregar partida</div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Ronda</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {TOURNAMENT_ROUNDS.map(r=>(
                  <button key={r} onClick={()=>setCurrRound(r)}
                    style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${currRound===r?C.orange:C.border}`,background:currRound===r?`${C.orange}15`:"none",color:currRound===r?C.orange:C.muted,fontSize:12,fontWeight:currRound===r?700:400}}>
                    {r}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Resultado</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                {[["win","Victoria",C.green],["mvp","MVP 👑",C.amber],["loss","Derrota",C.red],["draw","Empate","#7289da"]].map(([v,l,col])=>(
                  <button key={v} onClick={()=>setCurrR(currR===v?null:v)} style={{padding:"10px 6px",borderRadius:8,border:`1.5px solid ${currR===v?col:C.border}`,background:currR===v?`${col}15`:"none",color:currR===v?col:C.sub,fontSize:13,fontWeight:currR===v?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Estadísticas (opcional)</div>
              <PersonalStatFields duel={duel} scoreUs={scoreUs} setScoreUs={setScoreUs} scoreThem={scoreThem} setScoreThem={setScoreThem} myGoals={myGoals} setMyGoals={setMyGoals} myAssists={myAssists} setMyAssists={setMyAssists} mySaves={mySaves} setMySaves={setMySaves}/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Errores — total: {currEtot}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {errors.map(e=>{const cnt=currE[e.id]||0;return(
                  <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.surface,borderRadius:8,border:`1px solid ${cnt>0?`${C.orange}50`:C.border}`}}>
                    <span style={{fontSize:11,color:C.muted}}>{e.label}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick={()=>setCurrE(p=>({...p,[e.id]:Math.max(0,(p[e.id]||0)-1)}))} disabled={cnt===0} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.border}`,background:C.card,color:cnt>0?C.text:C.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:cnt>0?C.text:C.muted,minWidth:16,textAlign:"center"}}>{cnt}</span>
                      <button onClick={()=>setCurrE(p=>({...p,[e.id]:(p[e.id]||0)+1}))} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.orange}40`,background:`${C.orange}15`,color:C.orange,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                );})}
              </div>
            </div>
            <PrimaryBtn onClick={addMatch} color={C.orange} disabled={!currR}>+ Agregar partida {matches.length+1} ({currRound})</PrimaryBtn>
          </Card>
        </div>
        <Card>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:14}}>Partidas agregadas</div>
          {matches.length===0?<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"32px 0"}}>Agrega partidas aquí</div>
            :[...matches].reverse().map(m=>{
              const et=Object.values(m.errors).reduce((a,b)=>a+b,0);
              return(
                <div key={m.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:11,color:C.orange,fontWeight:600}}>{m.round}</span>
                    <ResultBadge result={m.result}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <ScoreBadge score={m.score}/>
                    {!duel&&<>{m.myGoals!=null&&<Tag color={C.green}>⚽{m.myGoals}</Tag>}{m.myAssists!=null&&<Tag color={C.blue}>🎯{m.myAssists}</Tag>}{m.mySaves!=null&&<Tag color={C.teal}>🧤{m.mySaves}</Tag>}</>}
                    {et>0&&<span style={{fontSize:11,color:C.muted}}>{et}e</span>}
                  </div>
                </div>
              );
            })
          }
        </Card>
      </div>
    </div>
  );
  const allWins=tournaments.reduce((a,t)=>a+t.matches.filter(isWin).length,0);
  const allPlayed=tournaments.reduce((a,t)=>a+t.matches.length,0);
  return(
    <div style={{padding:"32px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div><h1 style={{fontSize:26,fontWeight:700,color:C.text,marginBottom:4}}>Torneos</h1><p style={{fontSize:14,color:C.muted}}>Historial por modo y rango</p></div>
        <PrimaryBtn onClick={()=>setView("new")} color={C.orange} style={{width:"auto",padding:"12px 24px"}}>🏆 Registrar torneo</PrimaryBtn>
      </div>
      {tournaments.length>0&&<div className="stat-grid-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        {[["Torneos",tournaments.length,C.orange],["Partidas",allPlayed,C.text],["Victorias",allWins,C.green],["Win rate",allPlayed>0?Math.round(allWins/allPlayed*100)+"%":"—",C.blue]].map(([l,v,col])=>(
          <Card key={l}><StatBlock label={l} value={v} valueColor={col}/></Card>
        ))}
      </div>}
      {tournaments.length===0
        ?<Card><div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:16}}>🏆</div>
          <div style={{fontSize:16,fontWeight:600,color:C.sub,marginBottom:8}}>Sin torneos registrados</div>
          <div style={{fontSize:13}}>Registra tu primer torneo para ver estadísticas</div>
        </div></Card>
        :[...tournaments].reverse().map(t=>{
          const tm=MODES.find(m=>m.id===t.modeId)||{name:t.modeName,color:C.orange,icon:"🏆"};
          const trankDef=t.rankName?RANK_DEFS.find(r=>r.name===t.rankName):null;
          const tw=t.matches.filter(isWin).length,tl=t.matches.filter(m=>m.result==="loss").length;
          const tgf=t.matches.reduce((a,m)=>a+(m.score?.us||0),0),tga=t.matches.reduce((a,m)=>a+(m.score?.them||0),0);
          const roundsSeen=[...new Set(t.matches.map(m=>m.round))].filter(r=>TOURNAMENT_ROUNDS.includes(r)).sort((a,b)=>TOURNAMENT_ROUNDS.indexOf(b)-TOURNAMENT_ROUNDS.indexOf(a));
          const furthestRound=roundsSeen[0]||"—";
          return(
            <div key={t.id} onClick={()=>setViewT(t)}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",marginBottom:10,cursor:"pointer"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.orange;e.currentTarget.style.background=C.hover;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.card;}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:`${tm.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{tm.icon}</div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:15,fontWeight:700,color:C.text}}>Torneo</span>
                      {trankDef&&<Tag color={trankDef.color}>{trankDef.name}</Tag>}
                      <Tag color={tm.color}>{tm.name}</Tag>
                    </div>
                    <div style={{fontSize:12,color:C.muted}}>{t.date} · {t.time}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <Tag color={C.orange}>{furthestRound}</Tag>
                  <div style={{fontSize:11,color:C.muted,marginTop:4}}>{t.matches.length} partidas</div>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                <Tag color={C.green}>{tw}V</Tag><Tag color={C.red}>{tl}D</Tag>
                {t.matches.filter(m=>m.result==="draw").length>0&&<Tag color="#7289da">{t.matches.filter(m=>m.result==="draw").length}E</Tag>}
                <span style={{fontSize:12,color:C.muted,marginLeft:4}}>GF–GC: {tgf}–{tga}</span>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}


const OKEY = 'rlt3f_onboarded';
function isOnboarded(){ return !!localStorage.getItem(OKEY); }
function setOnboarded(){ localStorage.setItem(OKEY,'1'); }

function OnboardingWizard({ onComplete }) {
  const [step, setStep]  = useState(0);
  const [name, setName]  = useState('');
  const [mmrs, setMmrs]  = useState(() => { const m={}; MODES.forEach(mode=>{m[mode.id]=''}); return m; });
  const setMmr = (id, val) => setMmrs(prev => ({ ...prev, [id]: val }));
  const stdModes = MODES.filter(m => m.group === 'standard');
  const speModes = MODES.filter(m => m.group === 'special');
  const allStdFilled = stdModes.every(m => mmrs[m.id] !== '' && !isNaN(mmrs[m.id]));
  const allSpeFilled = speModes.every(m => mmrs[m.id] !== '' && !isNaN(mmrs[m.id]));
  const finish = () => {
    const hist={}, today=new Date().toLocaleDateString('es-ES');
    MODES.forEach(mode=>{ hist[mode.id]=[{date:today,mmr:Number(mmrs[mode.id])||0}]; });
    setOnboarded();
    onComplete({ name, mmrHistory: hist });
  };
  const steps = ['Bienvenida','Tu nombre','Modos estándar','Modos especiales'];
  return (
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:520}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:56,marginBottom:8}}>🚗</div>
          <div style={{fontSize:22,fontWeight:700,color:C.text}}>RL Tracker</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>Performance Intelligence</div>
        </div>
        {step>0&&step<4&&<div style={{display:'flex',gap:6,marginBottom:28,justifyContent:'center'}}>
          {steps.slice(1).map((s,i)=>(
            <div key={s} style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,
                background:i+1<step?C.green:i+1===step?C.blue:C.surface,
                color:i+1<=step?'#fff':C.muted,border:`1px solid ${i+1<step?C.green:i+1===step?C.blue:C.border}`}}>
                {i+1<step?'✓':i+2}
              </div>
              {i<2&&<div style={{width:24,height:1,background:i+1<step?C.green:C.border}}/>}
            </div>
          ))}
        </div>}
        {step===0&&<div style={{background:C.surface,borderRadius:16,padding:32,border:`1px solid ${C.border}`,textAlign:'center'}}>
          <h1 style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:12}}>Bienvenido a RL Tracker</h1>
          <p style={{fontSize:14,color:C.muted,lineHeight:1.7,marginBottom:28}}>Tu herramienta para trackear MMR, analizar errores y mejorar en Rocket League.<br/><br/>Configura tu perfil en menos de un minuto.</p>
          <button onClick={()=>setStep(1)} style={{width:'100%',padding:'14px',background:C.blue,color:'#fff',border:'none',borderRadius:10,fontSize:15,fontWeight:700,cursor:'pointer'}}>Empezar →</button>
        </div>}
        {step===1&&<div style={{background:C.surface,borderRadius:16,padding:32,border:`1px solid ${C.border}`}}>
          <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:6}}>¿Cómo te llaman?</h2>
          <p style={{fontSize:13,color:C.muted,marginBottom:24}}>Tu gamertag o nombre.</p>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: ProPlayer99"
            style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px',color:C.text,fontSize:20,fontWeight:700,fontFamily:"'DM Sans',sans-serif",marginBottom:24,outline:'none'}}
            onKeyDown={e=>e.key==='Enter'&&name.trim()&&setStep(2)} autoFocus/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button onClick={()=>setStep(0)} style={{padding:'12px',background:'none',border:`1px solid ${C.border}`,borderRadius:10,color:C.muted,fontSize:14,cursor:'pointer'}}>← Atrás</button>
            <button onClick={()=>setStep(2)} disabled={!name.trim()} style={{padding:'12px',background:name.trim()?C.blue:C.border,color:name.trim()?'#fff':C.muted,border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:name.trim()?'pointer':'default'}}>Continuar →</button>
          </div>
        </div>}
        {step===2&&<div style={{background:C.surface,borderRadius:16,padding:32,border:`1px solid ${C.border}`}}>
          <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:6}}>Modos Estándar</h2>
          <p style={{fontSize:13,color:C.muted,marginBottom:24}}>Tu MMR actual. Si no juegas uno, pon 0.</p>
          {stdModes.map(mode=>{
            const val=mmrs[mode.id]; const rank=val!==''&&!isNaN(val)?getRank(Number(val),mode.id,DEFAULT_MODE_RANKS):null;
            return(<div key={mode.id} style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
                <div style={{width:36,height:36,borderRadius:10,background:`${mode.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{mode.icon}</div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:C.text}}>{mode.name}</div>{rank&&<div style={{fontSize:11,color:rank.color,fontWeight:500}}>{rank.name}</div>}</div>
                <input type="number" value={val} onChange={e=>setMmr(mode.id,e.target.value)} placeholder="MMR"
                  style={{width:100,background:C.card,border:`1px solid ${val?mode.color:C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:18,fontWeight:700,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
              </div>
            </div>);
          })}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
            <button onClick={()=>setStep(1)} style={{padding:'12px',background:'none',border:`1px solid ${C.border}`,borderRadius:10,color:C.muted,fontSize:14,cursor:'pointer'}}>← Atrás</button>
            <button onClick={()=>setStep(3)} disabled={!allStdFilled} style={{padding:'12px',background:allStdFilled?C.blue:C.border,color:allStdFilled?'#fff':C.muted,border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:allStdFilled?'pointer':'default'}}>Continuar →</button>
          </div>
        </div>}
        {step===3&&<div style={{background:C.surface,borderRadius:16,padding:32,border:`1px solid ${C.border}`}}>
          <h2 style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:6}}>Modos Especiales</h2>
          <p style={{fontSize:13,color:C.muted,marginBottom:24}}>Si no juegas alguno, pon 0.</p>
          {speModes.map(mode=>{
            const val=mmrs[mode.id]; const rank=val!==''&&!isNaN(val)?getRank(Number(val),mode.id,DEFAULT_MODE_RANKS):null;
            return(<div key={mode.id} style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:34,height:34,borderRadius:10,background:`${mode.color}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>{mode.icon}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text}}>{mode.name}</div>{rank&&<div style={{fontSize:11,color:rank.color,fontWeight:500}}>{rank.name}</div>}</div>
                <input type="number" value={val} onChange={e=>setMmr(mode.id,e.target.value)} placeholder="MMR"
                  style={{width:100,background:C.card,border:`1px solid ${val?mode.color:C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:18,fontWeight:700,fontFamily:"'DM Mono',monospace",textAlign:'center',outline:'none'}}/>
              </div>
            </div>);
          })}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:16}}>
            <button onClick={()=>setStep(2)} style={{padding:'12px',background:'none',border:`1px solid ${C.border}`,borderRadius:10,color:C.muted,fontSize:14,cursor:'pointer'}}>← Atrás</button>
            <button onClick={finish} disabled={!allSpeFilled} style={{padding:'12px',background:allSpeFilled?C.green:C.border,color:allSpeFilled?'#000':C.muted,border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:allSpeFilled?'pointer':'default'}}>✓ Empezar →</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

function App(){
  const [onboarded,  setOnboardedS]  = useState(isOnboarded);
  const [playerName, setPlayerName]  = useState(()=>localStorage.getItem('rlt3f_name')||'');
  const [page,        setPage]        = useState("home");
  const [sessions,    setSessions]    = useState(loadSessions);
  const [mmrHist,     setMmrHist]     = useState(loadMMR);
  const [tournaments, setTournaments] = useState(loadTournaments);
  const [config,      setConfig]      = useState(loadConfig);
  const [custom,      setCustom]      = useState(loadCustomItems);
  const [mechanics,   setMechanics]   = useState(loadMechanics);
  const [viewSess,    setViewSess]    = useState(null);
  const [mmrModal,    setMmrModal]    = useState(null);
  const [showCloud,   setShowCloud]   = useState(false);
  const [showImport,  setShowImport]  = useState(false);
  const [syncStatus,  setSyncStatus]  = useState('idle'); // idle | syncing | ok | error | no_config
  const [lastSync,    setLastSync]    = useState(null);
  const cloudCfg = getCloudCfg();

  // Auto-pull on load if cloud configured
  const doInit = async () => {
    if (!getCloudCfg()) return;
    setSyncStatus('syncing');
    const record = await pullFromCloud();
    if (record) {
      const d = unbundleData(record);
      if (d.sessions    && d.sessions.length    > 0) { setSessions(d.sessions);       saveSessions(d.sessions); }
      if (d.mmrHistory  && Object.keys(d.mmrHistory).length > 0) { setMmrHist(d.mmrHistory); saveMMR(d.mmrHistory); }
      if (d.tournaments && d.tournaments.length > 0) { setTournaments(d.tournaments); saveTournaments(d.tournaments); }
      if (d.config      && Object.keys(d.config).length > 0) { setConfig(d.config);   saveConfig(d.config); }
      setSyncStatus('ok'); setLastSync(new Date());
    } else { setSyncStatus('error'); }
  };

  // Run once on mount
  React.useEffect(() => { doInit(); }, []);

  const doSync = async (s, m, t, cfg) => {
    if (!getCloudCfg()) { setSyncStatus('no_config'); return; }
    setSyncStatus('syncing');
    const result = await pushToCloud(bundleData(s, m, t, cfg));
    if (result.ok) { setSyncStatus('ok'); setLastSync(new Date()); }
    else { setSyncStatus('error'); }
  };

  const handleSave = (session) => {
    const ns=[session,...sessions]; setSessions(ns); saveSessions(ns);
    let nh = mmrHist;
    if(session.endMMR){ nh={...mmrHist}; if(!nh[session.modeId])nh[session.modeId]=[]; nh[session.modeId]=[...nh[session.modeId],{date:session.date,mmr:session.endMMR}]; setMmrHist(nh); saveMMR(nh); }
    setPage("home");
    doSync(ns, nh, tournaments, config);
  };
  const handleUpdateSession = (updated) => {
    const ns=sessions.map(s=>s.id===updated.id?updated:s); setSessions(ns); saveSessions(ns); setViewSess(updated);
    doSync(ns, mmrHist, tournaments, config);
  };
  const handleSaveMMR = (mode, mmr) => {
    const nh={...mmrHist}; if(!nh[mode.id])nh[mode.id]=[];
    nh[mode.id]=[...nh[mode.id],{date:new Date().toLocaleDateString("es-ES"),mmr}];
    setMmrHist(nh); saveMMR(nh); setMmrModal(null);
    doSync(sessions, nh, tournaments, config);
  };
  const handleSaveConfig = (cfg) => { setConfig(cfg); saveConfig(cfg); doSync(sessions, mmrHist, tournaments, cfg); };
  const handleSaveCustom = (cx) => { setCustom(cx); saveCustomItems(cx); };
  const handleSaveMechanics = (mx) => { setMechanics(mx); saveMechanics(mx); };
  const handleSaveTournament = (t) => { const nt=[t,...tournaments]; setTournaments(nt); saveTournaments(nt); doSync(sessions, mmrHist, nt, config); };

  const handleImport = (bundle) => {
    if(bundle.sessions)    { setSessions(bundle.sessions);       saveSessions(bundle.sessions); }
    if(bundle.mmrHistory)  { setMmrHist(bundle.mmrHistory);      saveMMR(bundle.mmrHistory); }
    if(bundle.tournaments) { setTournaments(bundle.tournaments);  saveTournaments(bundle.tournaments); }
    if(bundle.config)      { setConfig(bundle.config);           saveConfig(bundle.config); }
    doSync(bundle.sessions||sessions, bundle.mmrHistory||mmrHist, bundle.tournaments||tournaments, bundle.config||config);
  };

  const handlePullNow = async () => {
    setSyncStatus('syncing');
    const record = await pullFromCloud();
    if(record) {
      const d = unbundleData(record);
      if(d.sessions)    { setSessions(d.sessions);       saveSessions(d.sessions); }
      if(d.mmrHistory)  { setMmrHist(d.mmrHistory);      saveMMR(d.mmrHistory); }
      if(d.tournaments) { setTournaments(d.tournaments);  saveTournaments(d.tournaments); }
      if(d.config)      { setConfig(d.config);           saveConfig(d.config); }
      setSyncStatus('ok'); setLastSync(new Date());
    } else { setSyncStatus('error'); }
  };

  const modeId=page.startsWith("session_")?page.replace("session_",""):null;
  const syncColor = syncStatus==='ok'?C.green : syncStatus==='syncing'?C.amber : syncStatus==='error'?C.red : C.muted;
  const syncLabel = syncStatus==='ok'?'✓ Sync' : syncStatus==='syncing'?'⟳ Sync…' : syncStatus==='error'?'✕ Sync' : cloudCfg ? '↕ Sync' : '☁ Config';

  if(!onboarded) return(
    <OnboardingWizard onComplete={({name,mmrHistory})=>{
      localStorage.setItem('rlt3f_name',name);
      setPlayerName(name);
      setMmrHist(mmrHistory);
      saveMMR(mmrHistory);
      setOnboardedS(true);
    }}/>
  );

  return(
    <AppShell activePage={page} onNavigate={p=>{setPage(p);setViewSess(null);}} sessions={sessions} mmrHistory={mmrHist} tournaments={tournaments} config={config}
      syncStatus={syncStatus} syncLabel={syncLabel} syncColor={syncColor} lastSync={lastSync}
      onOpenCloud={()=>setShowCloud(true)} onOpenImport={()=>setShowImport(true)} onPullNow={handlePullNow} cloudCfg={cloudCfg} playerName={playerName}
      custom={custom} mechanics={mechanics} onSaveCustom={handleSaveCustom} onSaveMechanics={handleSaveMechanics}>
      {mmrModal&&<MMREditModal mode={mmrModal} currentMMR={getLatestMMR(mmrHist,mmrModal.id,mmrModal.initMMR)} config={config} onSave={mmr=>handleSaveMMR(mmrModal,mmr)} onClose={()=>setMmrModal(null)}/>}
      {showCloud&&<CloudConfigModal onClose={()=>setShowCloud(false)} onSaved={()=>{setSyncStatus('idle');doInit();}}/>}
      {showImport&&<ImportExportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
      {viewSess
        ?<SessionDetailPage session={viewSess} config={config} custom={custom} onBack={()=>setViewSess(null)} onUpdateSession={handleUpdateSession}/>
        :page==="home"        ?<HomePage sessions={sessions} mmrHistory={mmrHist} tournaments={tournaments} config={config} onNavigate={setPage} onEditMMR={m=>setMmrModal(m)}/>
        :page==="stats"       ?<StatsPage sessions={sessions} mmrHistory={mmrHist} config={config} custom={custom} onViewSession={s=>setViewSess(s)}/>
        :page==="tournaments" ?<TournamentPage sessions={sessions} tournaments={tournaments} config={config} onSaveTournament={handleSaveTournament}/>
        :page==="settings"    ?<SettingsPage config={config} onSaveConfig={handleSaveConfig} custom={custom} onSaveCustom={handleSaveCustom} mechanics={mechanics} onSaveMechanics={handleSaveMechanics} sessions={sessions} onUpdateSessions={(s)=>{setSessions(s);saveSessions(s);doSync(s,mmrHist,tournaments,config);}}/>
        :modeId               ?<SessionPage modeId={modeId} sessions={sessions} mmrHistory={mmrHist} config={config} custom={custom} mechanics={mechanics} onSaveMechanics={handleSaveMechanics} onSave={handleSave}/>
        :null
      }
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
