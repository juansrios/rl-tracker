function getRankTable(config, modeId) {
  const mins = config[modeId] || DEFAULT_MODE_RANKS[modeId] || DEFAULT_MODE_RANKS["3v3"];
  return RANK_DEFS.map((r, i) => ({ ...r, min: mins[i] ?? 0 }));
}
function getRank(mmr, modeId, config) {
  const table = getRankTable(config, modeId);
  return table.find(r => mmr >= r.min) || table[table.length - 1];
}

function getLatestMMR(hist,id,fb){ const h=hist[id]||[];return h.length>0?h[h.length-1].mmr:fb; }
function getMMRTrend(hist,id){ const h=hist[id]||[];return h.length<2?0:h[h.length-1].mmr-h[0].mmr; }
function avgErr(sessions,mid,eid){ const ms=sessions.filter(s=>s.modeId===mid);let t=0,c=0;ms.forEach(s=>s.matches.forEach(m=>{t+=(m.errors[eid]||0);c++;}));return c>0?t/c:null; }

function Sparkline({data,color,height=40}){
  if(data.length<2)return <div style={{height,display:"flex",alignItems:"center",color:"#4a4f6a",fontSize:11}}>Sin historial aún</div>;
  const W=300,H=height,P=4;
  const vals=data.map(d=>d.mmr),mn=Math.min(...vals)-5,mx=Math.max(...vals)+5,rng=mx-mn||1;
  const pts=data.map((d,i)=>({x:P+(i/(data.length-1))*(W-P*2),y:H-P-((d.mmr-mn)/rng)*(H-P*2)}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
  const area=path+` L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  const gid="gx"+color.replace("#","");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/>
      <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinejoin="round"/>
      {pts.map((p,i)=>i===pts.length-1&&<circle key={i} cx={p.x} cy={p.y} r={3} fill={color}/>)}
    </svg>
  );
}

  const col=score.us>score.them?C.green:score.us<score.them?C.red:"#7289da";
  return <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:col}}>{score.us}–{score.them}</span>;
};

function MMREditModal({mode,currentMMR,config,onSave,onClose}){
  const [val,setVal]=useState(String(currentMMR));
  const rank=val&&!isNaN(val)?getRank(Number(val),mode.id,config):null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}>
      <div style={{background:C.surface,borderRadius:16,padding:"28px",width:360,border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <div style={{width:40,height:40,borderRadius:10,background:`${mode.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{mode.icon}</div>
          <div><div style={{fontWeight:700,color:C.text,fontSize:16}}>{mode.name}</div><div style={{fontSize:12,color:C.muted}}>Ajustar MMR actual</div></div>
        </div>
        <NumInput value={val} onChange={setVal} placeholder="Ej: 620" large/>
        {rank&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,marginBottom:20}}>
          <div style={{width:8,height:8,borderRadius:2,background:rank.color}}/>
          <span style={{fontSize:13,color:rank.color,fontWeight:500}}>{rank.name}</span>
        </div>}
        <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.6,background:`${C.amber}10`,borderRadius:8,padding:"10px 12px",border:`1px solid ${C.amber}30`}}>
          ⚠️ Agrega punto de corrección al historial. No borra datos anteriores.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <SecondaryBtn onClick={onClose}>Cancelar</SecondaryBtn>
          <PrimaryBtn onClick={()=>onSave(Number(val))} color={mode.color} disabled={!val||isNaN(val)}>Guardar MMR</PrimaryBtn>
        </div>
      </div>
    </div>
  );
}

function SettingsPage({config,onSaveConfig}){
  const [draft,setDraft]=useState(()=>JSON.parse(JSON.stringify(config)));

        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

// ─── CLOUD SYNC (JSONBin) ────────────────────────────────────────────────────

const JKEY = 'rlt3_jcfg'; // local device config: {apiKey, binId}

function getCloudCfg() {
  try { const s = localStorage.getItem(JKEY); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveCloudCfg(cfg) { localStorage.setItem(JKEY, JSON.stringify(cfg)); }

function bundleData(sessions, mmrHist, tournaments, config) {
  return { sessions, mmrHistory: mmrHist, tournaments, config, lastSync: Date.now() };
}
function unbundleData(record) {
  return {
    sessions:    record.sessions    || [],
    mmrHistory:  record.mmrHistory  || {},
    tournaments: record.tournaments || [],
    config:      record.config      || {},
  };
}

async function pushToCloud(bundle) {
  const cfg = getCloudCfg();
  if (!cfg || !cfg.apiKey || !cfg.binId) return { ok: false, reason: 'no_config' };
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': cfg.apiKey },
      body: JSON.stringify(bundle)
    });
    return { ok: res.ok, status: res.status };
  } catch (e) { return { ok: false, reason: 'network' }; }
}

async function pullFromCloud() {
  const cfg = getCloudCfg();
  if (!cfg || !cfg.apiKey || !cfg.binId) return null;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: { 'X-Master-Key': cfg.apiKey }
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.record || null;
  } catch { return null; }
}

function ImportExportModal({ onClose, onImport }) {
  const [status, setStatus] = useState('');

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const bundle = {};
        if (data.rlt3_s)   bundle.sessions    = data.rlt3_s;
        if (data.rlt3_m)   bundle.mmrHistory  = data.rlt3_m;
        if (data.rlt3_t)   bundle.tournaments = data.rlt3_t;
        if (data.rlt3_cfg) bundle.config      = data.rlt3_cfg;
        // Also support direct bundle format
        if (data.sessions)    bundle.sessions    = bundle.sessions    || data.sessions;
        if (data.mmrHistory)  bundle.mmrHistory  = bundle.mmrHistory  || data.mmrHistory;
        if (data.tournaments) bundle.tournaments = bundle.tournaments || data.tournaments;
        if (data.config)      bundle.config      = bundle.config      || data.config;
        const keys = Object.keys(bundle).length;
        if (keys === 0) { setStatus('✕ Formato no reconocido.'); return; }
        onImport(bundle);
        setStatus(`✓ ${keys} secciones importadas correctamente.`);
        setTimeout(onClose, 1500);
      } catch { setStatus('✕ Archivo JSON inválido.'); }
    };
    reader.readAsText(file);
  };

  const exportNow = () => {
    const bundle = {
      exportDate: new Date().toISOString(),
      version: 'v7',
      rlt3_s:   JSON.parse(localStorage.getItem('rlt3_s')  || '[]'),
      rlt3_m:   JSON.parse(localStorage.getItem('rlt3_m')  || '{}'),
      rlt3_t:   JSON.parse(localStorage.getItem('rlt3_t')  || '[]'),
      rlt3_cfg: JSON.parse(localStorage.getItem('rlt3_cfg')|| '{}'),
    };
    const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `rl-tracker-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    setStatus('✓ Backup descargado.');
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000}} onClick={onClose}>
      <div style={{background:C.surface,borderRadius:16,padding:'28px',width:400,border:`1px solid ${C.border}`}} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,color:C.text,fontSize:16,marginBottom:4}}>📦 Importar / Exportar</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Migra datos desde el proyecto Vite o haz un backup manual</div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>Importar desde JSON</div>
          <label style={{display:'block',padding:'12px',border:`2px dashed ${C.border}`,borderRadius:8,textAlign:'center',cursor:'pointer',color:C.muted,fontSize:13}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.blue} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            Clic para seleccionar archivo JSON
            <input type="file" accept=".json" onChange={handleFile} style={{display:'none'}}/>
          </label>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,color:C.sub,fontWeight:600,marginBottom:8}}>Exportar backup</div>
          <button onClick={exportNow} style={{width:'100%',padding:'10px',background:C.hover,border:`1px solid ${C.border}`,borderRadius:8,color:C.sub,fontSize:13,cursor:'pointer',fontWeight:500}}>
            ⬇ Descargar rl-tracker-backup.json
          </button>
        </div>

        {status && <div style={{padding:'10px',borderRadius:8,background:status.startsWith('✓')?`${C.green}15`:`${C.red}15`,color:status.startsWith('✓')?C.green:C.red,fontSize:13,marginBottom:14}}>{status}</div>}

        <button onClick={onClose} style={{width:'100%',padding:'10px',background:'none',border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:13,cursor:'pointer'}}>Cerrar</button>
      </div>
    </div>
  );
}

              </div>
            </div>
            <div style={{fontSize:12,color:C.muted,marginBottom:8}}>
              Rango del torneo {selRank&&<span style={{color:RANK_DEFS.find(r=>r.name===selRank)?.color,fontWeight:700}}>· {selRank} ✓</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              {rankTable.map(r=>(
                <button key={r.name} onClick={()=>setSelRank(r.name)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${selRank===r.name?r.color:C.border}`,background:selRank===r.name?`${r.color}15`:"none",cursor:"pointer"}}>
                  <div style={{width:8,height:8,borderRadius:2,background:r.color,flexShrink:0}}/>
                  <span style={{fontSize:12,color:selRank===r.name?r.color:C.muted,fontWeight:selRank===r.name?700:400}}>{r.name}</span>
                </button>
              ))}
            </div>
          </Card>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.sub,marginBottom:16}}>Agregar partida</div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Ronda</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {TOURNAMENT_ROUNDS.map(r=>(
                  <button key={r} onClick={()=>setCurrRound(r)}
                    style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${currRound===r?C.orange:C.border}`,background:currRound===r?`${C.orange}15`:"none",color:currRound===r?C.orange:C.muted,fontSize:12,fontWeight:currRound===r?700:400}}>
                    {r}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Resultado</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                {[["win","Victoria",C.green],["mvp","MVP 👑",C.amber],["loss","Derrota",C.red],["draw","Empate","#7289da"]].map(([v,l,col])=>(
                  <button key={v} onClick={()=>setCurrR(currR===v?null:v)} style={{padding:"10px 6px",borderRadius:8,border:`1.5px solid ${currR===v?col:C.border}`,background:currR===v?`${col}15`:"none",color:currR===v?col:C.sub,fontSize:13,fontWeight:currR===v?700:400}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Estadísticas (opcional)</div>
              <PersonalStatFields duel={duel} scoreUs={scoreUs} setScoreUs={setScoreUs} scoreThem={scoreThem} setScoreThem={setScoreThem} myGoals={myGoals} setMyGoals={setMyGoals} myAssists={myAssists} setMyAssists={setMyAssists} mySaves={mySaves} setMySaves={setMySaves}/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Errores — total: {currEtot}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {errors.map(e=>{const cnt=currE[e.id]||0;return(
                  <div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.surface,borderRadius:8,border:`1px solid ${cnt>0?`${C.orange}50`:C.border}`}}>
                    <span style={{fontSize:11,color:C.muted}}>{e.label}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick={()=>setCurrE(p=>({...p,[e.id]:Math.max(0,(p[e.id]||0)-1)}))} disabled={cnt===0} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.border}`,background:C.card,color:cnt>0?C.text:C.muted,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:cnt>0?C.text:C.muted,minWidth:16,textAlign:"center"}}>{cnt}</span>
                      <button onClick={()=>setCurrE(p=>({...p,[e.id]:(p[e.id]||0)+1}))} style={{width:26,height:26,borderRadius:6,border:`1px solid ${C.orange}40`,background:`${C.orange}15`,color:C.orange,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                    </div>
                  </div>
                );})}
              </div>
            </div>
            <PrimaryBtn onClick={addMatch} color={C.orange} disabled={!currR}>+ Agregar partida {matches.length+1} ({currRound})</PrimaryBtn>
          </Card>
        </div>
        <Card>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:14}}>Partidas agregadas</div>
          {matches.length===0?<div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"32px 0"}}>Agrega partidas aquí</div>
            :[...matches].reverse().map(m=>{
              const et=Object.values(m.errors).reduce((a,b)=>a+b,0);
              return(
                <div key={m.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:11,color:C.orange,fontWeight:600}}>{m.round}</span>
                    <ResultBadge result={m.result}/>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <ScoreBadge score={m.score}/>
                    {!duel&&<>{m.myGoals!=null&&<Tag color={C.green}>⚽{m.myGoals}</Tag>}{m.myAssists!=null&&<Tag color={C.blue}>🎯{m.myAssists}</Tag>}{m.mySaves!=null&&<Tag color={C.teal}>🧤{m.mySaves}</Tag>}</>}
                    {et>0&&<span style={{fontSize:11,color:C.muted}}>{et}e</span>}
                  </div>
                </div>
              );
            })
          }
        </Card>
      </div>
    </div>
  );
  const allWins=tournaments.reduce((a,t)=>a+t.matches.filter(isWin).length,0);
  const allPlayed=tournaments.reduce((a,t)=>a+t.matches.length,0);
  return(
    <div style={{padding:"32px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div><h1 style={{fontSize:26,fontWeight:700,color:C.text,marginBottom:4}}>Torneos</h1><p style={{fontSize:14,color:C.muted}}>Historial por modo y rango</p></div>
        <PrimaryBtn onClick={()=>setView("new")} color={C.orange} style={{width:"auto",padding:"12px 24px"}}>🏆 Registrar torneo</PrimaryBtn>
      </div>
      {tournaments.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        {[["Torneos",tournaments.length,C.orange],["Partidas",allPlayed,C.text],["Victorias",allWins,C.green],["Win rate",allPlayed>0?Math.round(allWins/allPlayed*100)+"%":"—",C.blue]].map(([l,v,col])=>(
          <Card key={l}><StatBlock label={l} value={v} valueColor={col}/></Card>
        ))}
      </div>}
      {tournaments.length===0
        ?<Card><div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:16}}>🏆</div>
          <div style={{fontSize:16,fontWeight:600,color:C.sub,marginBottom:8}}>Sin torneos registrados</div>
          <div style={{fontSize:13}}>Registra tu primer torneo para ver estadísticas</div>
        </div></Card>
        :[...tournaments].reverse().map(t=>{
          const tm=MODES.find(m=>m.id===t.modeId)||{name:t.modeName,color:C.orange,icon:"🏆"};
          const trankDef=t.rankName?RANK_DEFS.find(r=>r.name===t.rankName):null;
          const tw=t.matches.filter(isWin).length,tl=t.matches.filter(m=>m.result==="loss").length;
          const tgf=t.matches.reduce((a,m)=>a+(m.score?.us||0),0),tga=t.matches.reduce((a,m)=>a+(m.score?.them||0),0);
          const roundsSeen=[...new Set(t.matches.map(m=>m.round))].filter(r=>TOURNAMENT_ROUNDS.includes(r)).sort((a,b)=>TOURNAMENT_ROUNDS.indexOf(b)-TOURNAMENT_ROUNDS.indexOf(a));
          const furthestRound=roundsSeen[0]||"—";
          return(
            <div key={t.id} onClick={()=>setViewT(t)}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",marginBottom:10,cursor:"pointer"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.orange;e.currentTarget.style.background=C.hover;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.card;}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:10,background:`${tm.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{tm.icon}</div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <span style={{fontSize:15,fontWeight:700,color:C.text}}>Torneo</span>
                      {trankDef&&<Tag color={trankDef.color}>{trankDef.name}</Tag>}
                      <Tag color={tm.color}>{tm.name}</Tag>
                    </div>
                    <div style={{fontSize:12,color:C.muted}}>{t.date} · {t.time}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <Tag color={C.orange}>{furthestRound}</Tag>
                  <div style={{fontSize:11,color:C.muted,marginTop:4}}>{t.matches.length} partidas</div>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                <Tag color={C.green}>{tw}V</Tag><Tag color={C.red}>{tl}D</Tag>
                {t.matches.filter(m=>m.result==="draw").length>0&&<Tag color="#7289da">{t.matches.filter(m=>m.result==="draw").length}E</Tag>}
                <span style={{fontSize:12,color:C.muted,marginLeft:4}}>GF–GC: {tgf}–{tga}</span>
              </div>
            </div>
          );
        })
      }
    </div>
  );
}

function App(){
  const [page,        setPage]        = useState("home");
  const [sessions,    setSessions]    = useState(loadSessions);
  const [mmrHist,     setMmrHist]     = useState(loadMMR);
  const [tournaments, setTournaments] = useState(loadTournaments);
  const [config,      setConfig]      = useState(loadConfig);
  const [viewSess,    setViewSess]    = useState(null);
  const [mmrModal,    setMmrModal]    = useState(null);
  const [showCloud,   setShowCloud]   = useState(false);
  const [showImport,  setShowImport]  = useState(false);
  const [syncStatus,  setSyncStatus]  = useState('idle'); // idle | syncing | ok | error | no_config
  const [lastSync,    setLastSync]    = useState(null);
  const cloudCfg = getCloudCfg();

  // Auto-pull on load if cloud configured
  const doInit = async () => {
    if (!getCloudCfg()) return;
    setSyncStatus('syncing');
    const record = await pullFromCloud();
    if (record) {
      const d = unbundleData(record);
      if (d.sessions    && d.sessions.length    > 0) { setSessions(d.sessions);       saveSessions(d.sessions); }
      if (d.mmrHistory  && Object.keys(d.mmrHistory).length > 0) { setMmrHist(d.mmrHistory); saveMMR(d.mmrHistory); }
      if (d.tournaments && d.tournaments.length > 0) { setTournaments(d.tournaments); saveTournaments(d.tournaments); }
      if (d.config      && Object.keys(d.config).length > 0) { setConfig(d.config);   saveConfig(d.config); }
      setSyncStatus('ok'); setLastSync(new Date());
    } else { setSyncStatus('error'); }
  };

  // Run once on mount
  useState(() => { doInit(); }, []);

  const doSync = async (s, m, t, cfg) => {
    if (!getCloudCfg()) { setSyncStatus('no_config'); return; }
    setSyncStatus('syncing');
    const result = await pushToCloud(bundleData(s, m, t, cfg));
    if (result.ok) { setSyncStatus('ok'); setLastSync(new Date()); }
    else { setSyncStatus('error'); }
  };

  const handleSave = (session) => {
    const ns=[session,...sessions]; setSessions(ns); saveSessions(ns);
    let nh = mmrHist;
    if(session.endMMR){ nh={...mmrHist}; if(!nh[session.modeId])nh[session.modeId]=[]; nh[session.modeId]=[...nh[session.modeId],{date:session.date,mmr:session.endMMR}]; setMmrHist(nh); saveMMR(nh); }
    setPage("home");
    doSync(ns, nh, tournaments, config);
  };
  const handleUpdateSession = (updated) => {
    const ns=sessions.map(s=>s.id===updated.id?updated:s); setSessions(ns); saveSessions(ns); setViewSess(updated);
    doSync(ns, mmrHist, tournaments, config);
  };
  const handleSaveMMR = (mode, mmr) => {
    const nh={...mmrHist}; if(!nh[mode.id])nh[mode.id]=[];
    nh[mode.id]=[...nh[mode.id],{date:new Date().toLocaleDateString("es-ES"),mmr}];
    setMmrHist(nh); saveMMR(nh); setMmrModal(null);
    doSync(sessions, nh, tournaments, config);
  };
  const handleSaveConfig = (cfg) => { setConfig(cfg); saveConfig(cfg); doSync(sessions, mmrHist, tournaments, cfg); };
  const handleSaveTournament = (t) => { const nt=[t,...tournaments]; setTournaments(nt); saveTournaments(nt); doSync(sessions, mmrHist, nt, config); };

  const handleImport = (bundle) => {
    if(bundle.sessions)    { setSessions(bundle.sessions);       saveSessions(bundle.sessions); }
    if(bundle.mmrHistory)  { setMmrHist(bundle.mmrHistory);      saveMMR(bundle.mmrHistory); }
    if(bundle.tournaments) { setTournaments(bundle.tournaments);  saveTournaments(bundle.tournaments); }
    if(bundle.config)      { setConfig(bundle.config);           saveConfig(bundle.config); }
    doSync(bundle.sessions||sessions, bundle.mmrHistory||mmrHist, bundle.tournaments||tournaments, bundle.config||config);
  };

  const handlePullNow = async () => {
    setSyncStatus('syncing');
    const record = await pullFromCloud();
    if(record) {
      const d = unbundleData(record);
      if(d.sessions)    { setSessions(d.sessions);       saveSessions(d.sessions); }
      if(d.mmrHistory)  { setMmrHist(d.mmrHistory);      saveMMR(d.mmrHistory); }
      if(d.tournaments) { setTournaments(d.tournaments);  saveTournaments(d.tournaments); }
      if(d.config)      { setConfig(d.config);           saveConfig(d.config); }
      setSyncStatus('ok'); setLastSync(new Date());
    } else { setSyncStatus('error'); }
  };

  const modeId=page.startsWith("session_")?page.replace("session_",""):null;
  const syncColor = syncStatus==='ok'?C.green : syncStatus==='syncing'?C.amber : syncStatus==='error'?C.red : C.muted;
  const syncLabel = syncStatus==='ok'?'✓ Sync' : syncStatus==='syncing'?'⟳ Sync…' : syncStatus==='error'?'✕ Sync' : cloudCfg ? '↕ Sync' : '☁ Config';

  return(
    <AppShell activePage={page} onNavigate={p=>{setPage(p);setViewSess(null);}} sessions={sessions} mmrHistory={mmrHist} tournaments={tournaments} config={config}
      syncStatus={syncStatus} syncLabel={syncLabel} syncColor={syncColor} lastSync={lastSync}
      onOpenCloud={()=>setShowCloud(true)} onOpenImport={()=>setShowImport(true)} onPullNow={handlePullNow} cloudCfg={cloudCfg}>
      {mmrModal&&<MMREditModal mode={mmrModal} currentMMR={getLatestMMR(mmrHist,mmrModal.id,mmrModal.initMMR)} config={config} onSave={mmr=>handleSaveMMR(mmrModal,mmr)} onClose={()=>setMmrModal(null)}/>}
      {showCloud&&<CloudConfigModal onClose={()=>setShowCloud(false)} onSaved={()=>{setSyncStatus('idle');doInit();}}/>}
      {showImport&&<ImportExportModal onClose={()=>setShowImport(false)} onImport={handleImport}/>}
      {viewSess
        ?<SessionDetailPage session={viewSess} config={config} onBack={()=>setViewSess(null)} onUpdateSession={handleUpdateSession}/>
        :page==="home"        ?<HomePage sessions={sessions} mmrHistory={mmrHist} tournaments={tournaments} config={config} onNavigate={setPage} onEditMMR={m=>setMmrModal(m)}/>
        :page==="stats"       ?<StatsPage sessions={sessions} mmrHistory={mmrHist} config={config} onViewSession={s=>setViewSess(s)}/>
        :page==="tournaments" ?<TournamentPage sessions={sessions} tournaments={tournaments} config={config} onSaveTournament={handleSaveTournament}/>
        :page==="settings"    ?<SettingsPage config={config} onSaveConfig={handleSaveConfig}/>
        :modeId               ?<SessionPage modeId={modeId} sessions={sessions} mmrHistory={mmrHist} config={config} onSave={handleSave}/>
        :null
      }
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
